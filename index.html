                  <div style={{width:42,height:42,borderRadius:"50%",flexShrink:0,background:d.estado==="en_camino"?B.infoBg:d.urgente?"#FEE2E2":B.orangeLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:d.urgente?20:16,fontWeight:800,color:d.estado==="en_camino"?B.info:d.urgente?B.urgent:B.orange}}>{d.urgente?"🚨":d.orden}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:16,fontWeight:800,color:d.urgente?B.urgent:B.dark}}>{d.cliente}</div>
                    <div style={{fontSize:13,color:B.gray,marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📍 {d.direccion}</div>
                    {d.notas && <div style={{fontSize:12,color:B.gray,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>💬 {d.notas.substring(0,50)}{d.notas.length>50?"...":""}</div>}
                    <div style={{fontSize:13,color:B.gray,marginTop:3}}>📦 {d.bultos} bulto{d.bultos>1?"s":""} · 🕐 {d.hora||"—"}</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>{d.urgente&&<UrgBadge/>}<Badge status={d.estado}/><span style={{color:B.gray,fontSize:22}}>›</span></div>
                </button>
                <div style={{display:"grid",gridTemplateColumns:d.telefono?"1fr 1fr":"1fr",borderTop:`1px solid ${borderColor}`}}>
                  {d.telefono&&<a href={`tel:${d.telefono}`} onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"12px 10px",color:B.info,fontWeight:800,fontSize:14,textDecoration:"none",borderRight:`1px solid ${borderColor}`,background:"transparent"}}>📞 Llamar</a>}
                  <a href={navUrl} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"12px 10px",color:B.orange,fontWeight:800,fontSize:14,textDecoration:"none",background:"transparent"}}>🚗 Waze</a>
                </div>
              </div>
            </div>;
          })}
          {absentMine.length>0&&absentMine.map(d=>(
            <button key={d.id} onClick={()=>onSelectDelivery(d.id)} style={{width:"100%",background:B.absentBg,border:`1.5px solid ${B.absentBorder}`,borderRadius:16,padding:"16px 18px",cursor:"pointer",textAlign:"left",boxShadow:"0 1px 3px rgba(0,0,0,.06)",display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:42,height:42,borderRadius:"50%",flexShrink:0,background:"#DDD6FE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:800,color:B.absent}}>🏠</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:16,fontWeight:800,color:B.absent}}>{d.cliente}</div>

              </div>
              <Badge status="ausente"/>
            </button>
          ))}
          {delivered.length>0&&<div style={{marginTop:4}}>
            <button onClick={()=>setShowDelivered(s=>!s)} style={{width:"100%",background:"none",border:`1.5px solid ${B.border}`,borderRadius:12,padding:"10px 16px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:14,fontWeight:700,color:B.gray}}>
              <span>✅ Entregados ({delivered.length})</span><span>{showDelivered?"▾":"▸"}</span>
            </button>
            {showDelivered&&<div style={{marginTop:8,display:"flex",flexDirection:"column",gap:8}}>
              {delivered.map(d=>(

        </div>
      </div>
    </div>
  );
}

/* ── DELIVERY DETAIL ── */
function DeliveryDetail({delivery,onBack,onStart,onSign,onAbsent}) {
  // Si ya hay llegadaTs en Firebase, mostramos "Llegaste a las HH:MM" desde el arranque
  const initialLlegoTime = delivery.llegadaTs ? new Date(delivery.llegadaTs).toLocaleTimeString("es-UY",{hour:"2-digit",minute:"2-digit"}) : null;
  const [llegoTime, setLlegoTime] = useState(initialLlegoTime);
  const [showAbsentModal,setShowAbsentModal]=useState(false);
  const [locError, setLocError] = useState(null);
  // Cronómetro en vivo para entregas en_camino
  const [liveNow, setLiveNow] = useState(Date.now());
  useEffect(()=>{
    if(delivery.estado!=='en_camino') return;
    const i = setInterval(()=>setLiveNow(Date.now()), 1000);
    return()=>clearInterval(i);
  },[delivery.estado]);
  // Fase del cronómetro:
  //  - Si aún no tocó "Llegué": mide VIAJE desde inicioTs
  //  - Si ya tocó "Llegué": mide EN PUERTA desde llegadaTs (se reinicia visualmente)
  const enCamino = delivery.estado==='en_camino';
  const enPuerta = enCamino && !!delivery.llegadaTs;
  const baseTs = enPuerta ? delivery.llegadaTs : delivery.inicioTs;
  const elapsedMs = (enCamino && baseTs) ? Math.max(0, liveNow - baseTs) : 0;
  const elMin = Math.floor(elapsedMs/60000);
  const elSec = Math.floor((elapsedMs/1000)%60);
  // Cronómetro neutro: naranja Mundo M en viaje, azul info en puerta (para diferenciar visualmente la fase).
  const tColor = enPuerta ? B.info : B.orange;
  const tBg = enPuerta ? B.infoBg : B.orangeLight;
  const tBorder = enPuerta ? "#93C5FD" : "#FDBA74";
  const tLabel = enPuerta ? "📦 En puerta del cliente" : "🚚 Tiempo de viaje";

  // GPS tracking: share location to Firebase while en_camino
  useEffect(()=>{
    if(delivery.estado!=="en_camino"||!delivery.tracking) return;
    if(!navigator.geolocation){setLocError("no_support");return;}
    const watchId=navigator.geolocation.watchPosition(
      (pos)=>{
        db.ref("tracking/"+delivery.tracking+"/vehicleLocation").set({
          lat:pos.coords.latitude, lng:pos.coords.longitude, ts:Date.now()
        });
        setLocError(null);
      },
      (err)=>{
        if(err.code===1) setLocError("denied");
        else setLocError("error");
      },
      {enableHighAccuracy:true, maximumAge:8000, timeout:20000}
    );
    return()=>{
      navigator.geolocation.clearWatch(watchId);
      // Clear location when no longer en_camino
      if(delivery.tracking) db.ref("tracking/"+delivery.tracking+"/vehicleLocation").remove();
    };
  },[delivery.estado, delivery.tracking]);
  const wazeUrl=`https://waze.com/ul?navigate=yes&q=${encodeURIComponent(delivery.direccion+", Montevideo, Uruguay")}`;
  const isAbsent=delivery.estado==="ausente";
  return (
    <div className="shell">
      {showAbsentModal&&<AbsentConfirmModal onConfirm={(foto)=>{setShowAbsentModal(false);onAbsent(foto);}} onCancel={()=>setShowAbsentModal(false)}/>}
      <div className="top-bar">
        <div className="top-bar-in">
          <button onClick={onBack} style={{background:B.orangeLight,border:"none",borderRadius:10,padding:"9px 16px",cursor:"pointer",color:B.orange,fontWeight:700,fontSize:14}}>← Volver</button>
          <div style={{flex:1,fontSize:17,fontWeight:800,color:B.dark}}>Detalle de Entrega</div>
          <div style={{display:"flex",gap:6}}>{delivery.urgente&&<UrgBadge/>}<Badge status={delivery.estado}/></div>
        </div>
      </div>
      <div className="page-wrap" style={{maxWidth:700}}>
        <OfflineBanner/>
        {enCamino && baseTs && (
          <div style={{background:tBg, border:`2px solid ${tBorder}`, borderRadius:16, padding:"14px 20px", marginBottom:16, textAlign:"center"}}>
            <div style={{fontSize:11, color:tColor, fontWeight:800, textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:4}}>{tLabel}</div>
            <div style={{fontSize:42, fontWeight:900, color:tColor, lineHeight:1, fontVariantNumeric:"tabular-nums", fontFamily:"monospace, 'Nunito Sans', sans-serif"}}>
              {String(elMin).padStart(2,"0")}:{String(elSec).padStart(2,"0")}
            </div>
            <div style={{fontSize:11, color:B.gray, marginTop:6}}>
              {enPuerta ? "Se mide desde que tocaste '📍 Llegué'" : "Tocá '📍 Llegué' al estacionar para medir el tiempo en puerta"}
            </div>
          </div>
        )}
        {isAbsent&&<div style={{background:B.absentBg,border:`2px solid ${B.absentBorder}`,borderRadius:14,padding:"14px 18px",marginBottom:20,display:"flex",gap:12,alignItems:"center"}}><span style={{fontSize:26}}>🏠</span><div><div style={{fontSize:15,fontWeight:800,color:B.absent}}>No estaba en casa</div><div style={{fontSize:13,color:"#6D28D9"}}>Podés reintentar o coordinar por WhatsApp</div></div></div>}
        {isAbsent&&delivery.fotoAusente&&<div style={{marginBottom:16}}><div style={{fontSize:12,color:B.absent,fontWeight:800,textTransform:"uppercase",marginBottom:6}}>Foto de evidencia</div><PhotoBox src={delivery.fotoAusente} alt="Evidencia" style={{width:"100%",borderRadius:12,border:`1.5px solid ${B.absentBorder}`,maxHeight:220,objectFit:"cover"}} minHeight={140}/></div>}
        {delivery.urgente&&!isAbsent&&<div style={{background:B.urgentBg,border:`2px solid ${B.urgentBorder}`,borderRadius:14,padding:"14px 18px",marginBottom:20,display:"flex",gap:12,alignItems:"center"}}><span style={{fontSize:26}}>🚨</span><div style={{fontSize:15,fontWeight:800,color:B.urgent}}>Pedido urgente — prioridad máxima</div></div>}
        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:24}}>
          <div style={{width:56,height:56,background:isAbsent?B.absent:delivery.urgente?B.urgent:B.orange,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:900,color:"white",flexShrink:0}}>{isAbsent?"🏠":delivery.urgente?"🚨":delivery.orden}</div>
          <div><div style={{fontSize:12,color:B.gray,textTransform:"uppercase",letterSpacing:"0.5px"}}>Parada #{delivery.orden}</div><div style={{fontSize:24,fontWeight:900,color:isAbsent?B.absent:delivery.urgente?B.urgent:B.dark}}>{delivery.cliente}</div></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <Card style={{gridColumn:"1/-1"}}><div style={{fontSize:11,color:B.gray,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.5px"}}>Dirección</div><div style={{fontSize:17,fontWeight:700,color:B.dark}}>{delivery.direccion}</div></Card>
          <Card><div style={{fontSize:11,color:B.gray,marginBottom:5}}>Teléfono</div><div style={{fontSize:16,fontWeight:700,color:B.dark}}>{delivery.telefono||"—"}</div></Card>
          <Card><div style={{fontSize:11,color:B.gray,marginBottom:5}}>Bultos</div><div style={{fontSize:16,fontWeight:700,color:B.dark}}>📦 {delivery.bultos}</div></Card>
          <Card><div style={{fontSize:11,color:B.gray,marginBottom:5}}>Vehículo</div><div style={{fontSize:16,fontWeight:700,color:B.dark}}>{VE[delivery.vehiculo]} {delivery.vehiculo}</div></Card>
          <Card><div style={{fontSize:11,color:B.gray,marginBottom:5}}>Hora estimada</div><div style={{fontSize:16,fontWeight:700,color:B.dark}}>🕐 {delivery.hora||"—"}</div></Card>
        </div>
        {delivery.notas&&<Card style={{marginBottom:12,background:delivery.urgente?B.urgentBg:B.orangeLight,border:`1.5px solid ${delivery.urgente?B.urgentBorder:"#FDBF8A"}`}}><div style={{fontSize:11,color:delivery.urgente?B.urgent:B.orange,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:6}}>Notas</div><div style={{fontSize:15,color:B.dark}}>{delivery.notas}</div></Card>}
        <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:20}}>
          <Btn full variant="ghost" size="lg" href={wazeUrl}>🗺 Navegar con Waze</Btn>
          {delivery.telefono&&<Btn full variant="ghost" size="lg" href={`tel:${delivery.telefono}`}>📞 Llamar · {delivery.telefono}</Btn>}
          {delivery.telefono&&(()=>{
            const t=wpNum(delivery.telefono);
            const trackUrl=delivery.tracking?(window.location.href.split('#')[0]+"#track/"+delivery.tracking):"";
            if(isAbsent){
              const mAusente="Hola! Pasamos a entregar tu pedido de Mundo M en "+delivery.direccion+" pero no encontramos a nadie. Por favor contactanos para coordinar una nueva fecha de entrega. Gracias!";
              return <a href={"https://wa.me/"+t+"?text="+encodeURIComponent(mAusente)} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"#25D366",color:"white",borderRadius:12,padding:"13px 20px",fontWeight:800,fontSize:15,textDecoration:"none",width:"100%",boxSizing:"border-box"}}>Coordinar nueva entrega por WhatsApp</a>;
            }
            if(delivery.estado==='entregado'){
              const mFeedback="Hola! Muchas gracias por recibir tu pedido de Mundo M. ¿Cómo estuvo la entrega?"+(trackUrl?" Te agradeceríamos muchísimo si nos dejás una calificación aquí: "+trackUrl:"")+" Tu opinión nos ayuda a mejorar. Gracias!";
              return <a href={"https://wa.me/"+t+"?text="+encodeURIComponent(mFeedback)} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"#F59E0B",color:"white",borderRadius:12,padding:"13px 20px",fontWeight:800,fontSize:15,textDecoration:"none",width:"100%",boxSizing:"border-box"}}>⭐ Reenviar pedido de feedback</a>;
            }
            const mCamino="Hola! Soy del equipo de Mundo M. Tu pedido está en camino y llegamos a "+delivery.direccion+" pronto."+(trackUrl?" Podés seguir tu entrega en tiempo real aquí: "+trackUrl:"")+" Te avisamos cuando estemos cerca. Gracias!";
            const m3min="Hola! Estamos a 3 minutos de tu casa. Agradecemos nos esperes en la puerta para poder entregarte tu producto! Gracias!";
            return <><a href={"https://wa.me/"+t+"?text="+encodeURIComponent(mCamino)} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"#25D366",color:"white",borderRadius:12,padding:"13px 20px",fontWeight:800,fontSize:15,textDecoration:"none",width:"100%",boxSizing:"border-box"}}>Pedido en camino</a><a href={"https://wa.me/"+t+"?text="+encodeURIComponent(m3min)} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"#128C7E",color:"white",borderRadius:12,padding:"13px 20px",fontWeight:800,fontSize:15,textDecoration:"none",width:"100%",boxSizing:"border-box"}}>Llegamos en 3 minutos</a></>;
          })()}
          {!isAbsent&&delivery.estado==="pendiente"&&<Btn full variant="secondary" size="lg" onClick={onStart}>▶ Iniciar entrega</Btn>}
          {!isAbsent&&delivery.estado==="en_camino"&&!llegoTime&&<Btn full variant="ghost" size="lg" onClick={()=>{const now=Date.now();db.ref("deliveries/"+delivery.id+"/llegadaTs").set(now);setLlegoTime(new Date(now).toLocaleTimeString("es-UY",{hour:"2-digit",minute:"2-digit"}));}}>📍 Llegué</Btn>}
          {!isAbsent&&delivery.estado==="en_camino"&&!llegoTime&&<div style={{background:"#FEF3C7",border:"1.5px solid #FCD34D",borderRadius:12,padding:"10px 14px",fontSize:13,color:"#92400E",fontWeight:700,textAlign:"center"}}>⚠️ Tocá "📍 Llegué" al estacionar. Sin eso no podemos medir cuánto tiempo te tomó la entrega en la puerta.</div>}
          {llegoTime&&<div style={{background:B.infoBg,borderRadius:12,padding:12,fontSize:14,color:B.info,fontWeight:700,textAlign:"center"}}>📍 Llegaste a las {llegoTime}</div>}
          {delivery.estado==="en_camino"&&locError==="denied"&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:10,padding:"10px 14px",fontSize:12,color:B.urgent,marginTop:6}}>⚠️ Permiso de ubicación denegado. El cliente no podrá ver tu posición en el mapa. Activalo en la configuración del navegador.</div>}
          {delivery.estado==="en_camino"&&!locError&&delivery.tracking&&<div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:10,padding:"8px 14px",fontSize:12,color:B.success,marginTop:6}}>📡 Compartiendo ubicación en tiempo real con el cliente</div>}
          {!isAbsent&&delivery.estado==="en_camino"&&(
            llegoTime
              ? <Btn full variant="primary" size="lg" onClick={onSign}>✅ Confirmar y registrar firma</Btn>
              : <Btn full variant="primary" size="lg" onClick={()=>{
                  const ok = window.confirm("Para registrar bien la entrega, primero tenés que tocar '📍 Llegué' al estacionar.\n\n¿Querés que lo marque ahora con la hora actual? (solo si realmente acabás de llegar).");
                  if(ok){
                    const now=Date.now();
                    db.ref("deliveries/"+delivery.id+"/llegadaTs").set(now);
                    setLlegoTime(new Date(now).toLocaleTimeString("es-UY",{hour:"2-digit",minute:"2-digit"}));
                    setTimeout(()=>onSign(), 200);
                  }
                }}>✅ Confirmar y registrar firma</Btn>
          )}
          {!isAbsent&&(delivery.estado==="pendiente"||delivery.estado==="en_camino")&&(
            <button onClick={()=>setShowAbsentModal(true)} style={{width:"100%",background:B.absentBg,border:`1.5px solid ${B.absentBorder}`,borderRadius:12,padding:"15px 24px",cursor:"pointer",fontWeight:800,fontSize:15,color:B.absent,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              🏠 No estaba en casa
            </button>
          )}
          {isAbsent&&<Btn full variant="secondary" size="lg" onClick={()=>onAbsent("retry")}>↩ Reintentar entrega</Btn>}
        </div>
      </div>
    </div>
  );
}

/* ── SIGNATURE ── */
function SignatureScreen({delivery,onConfirm,onBack}) {
  const canvasRef=useRef(null);
  const [drawing,setDrawing]=useState(false);
  const [hasSig,setHasSig]=useState(false);
  const [receptor,setReceptor]=useState("");
  const [foto,setFoto]=useState(null);
  const last=useRef(null);
  const getPos=(e,c)=>{const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height,s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*sx,y:(s.clientY-r.top)*sy};};
  const start=e=>{e.preventDefault();setDrawing(true);const p=getPos(e,canvasRef.current);last.current=p;const ctx=canvasRef.current.getContext("2d");ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fillStyle=B.dark;ctx.fill();};
  const draw=e=>{e.preventDefault();if(!drawing)return;const c=canvasRef.current,ctx=c.getContext("2d"),p=getPos(e,c);ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle=B.dark;ctx.lineWidth=3;ctx.lineCap="round";ctx.lineJoin="round";ctx.stroke();last.current=p;setHasSig(true);};

          <div style={{fontSize:14,color:B.gray,marginTop:2}}>📦 {delivery.bultos} bulto{delivery.bultos>1?"s":""} · {delivery.direccion}</div>
        </Card>
        <Field label="Nombre de quien recibe" value={receptor} onChange={setReceptor} placeholder="Ej: Maria Gonzalez" required/>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:700,color:B.dark,marginBottom:8}}>Foto de la entrega <span style={{fontSize:12,color:B.gray,fontWeight:400}}>(opcional)</span></div>

            {hasSig&&<button onClick={()=>{canvasRef.current.getContext("2d").clearRect(0,0,600,220);setHasSig(false);}} style={{background:"none",border:"none",color:B.gray,cursor:"pointer",fontSize:13}}>🗑 Borrar</button>}
          </div>
          <div style={{border:`2px dashed ${hasSig?B.orange:B.border}`,borderRadius:16,overflow:"hidden",background:B.white,position:"relative",touchAction:"none"}}>
            <canvas ref={canvasRef} width={600} height={220} style={{width:"100%",height:220,display:"block",cursor:"crosshair"}} onMouseDown={start} onMouseMove={draw} onMouseUp={end} onMouseLeave={end} onTouchStart={start} onTouchMove={draw} onTouchEnd={end}/>
            {!hasSig&&<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",color:"#D1D5DB",fontSize:15,pointerEvents:"none"}}>Firma aqui</div>}

      </div>
    </div>
  );

/* ── LIVE MAP ── */
function LiveMap({vehicleLocation}) {
  const mapRef = useRef(null);
  const mapInstance = useRef(null);
  const markerRef = useRef(null);

  useEffect(()=>{
    if(!mapRef.current || !vehicleLocation) return;
    const {lat, lng} = vehicleLocation;
    if(!window.L) return; // Leaflet not loaded

    if(!mapInstance.current) {
      mapInstance.current = window.L.map(mapRef.current, {zoomControl:true, attributionControl:false}).setView([lat, lng], 15);
      window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance.current);
      const icon = window.L.divIcon({html:'<div class="vehicle-marker-icon">🚚</div>', className:'', iconSize:[36,36], iconAnchor:[18,18]});
      markerRef.current = window.L.marker([lat, lng], {icon}).addTo(mapInstance.current);
    } else {
      markerRef.current.setLatLng([lat, lng]);
      mapInstance.current.panTo([lat, lng], {animate:true, duration:1});
    }
  }, [vehicleLocation]);

  useEffect(()=>{
    return()=>{
      if(mapInstance.current){ mapInstance.current.remove(); mapInstance.current=null; }
    };
  },[]);

  const secsAgo = vehicleLocation ? Math.round((Date.now()-vehicleLocation.ts)/1000) : 0;

  return (
    <div style={{marginTop:16}}>
      <div style={{fontSize:12,fontWeight:700,color:"#1D4ED8",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
        <span style={{width:8,height:8,borderRadius:"50%",background:"#10B981",display:"inline-block",animation:"pulse 1.5s infinite"}}/>
        Ubicación en tiempo real · actualizada hace {secsAgo < 60 ? secsAgo+"s" : Math.round(secsAgo/60)+"min"}
      </div>
      <div ref={mapRef} style={{height:220,borderRadius:12,overflow:"hidden",border:"1.5px solid #DBEAFE"}}/>
      <div style={{fontSize:11,color:"#6B7280",marginTop:6,textAlign:"center"}}>🗺️ El vehículo se actualiza automáticamente</div>
    </div>
  );
}

      await db.ref('ratings/' + trackingCode).set(payload);

      setError('No se pudo enviar. Intentá de nuevo.');
      setSending(false);
    }
  };

  return (
    <div style={{background:'white', borderRadius:18, padding:'24px 22px', boxShadow:'0 4px 16px rgba(0,0,0,.08)', marginBottom:16, border:`2px solid ${B.orange}`}}>

        <StarRating value={stars} onChange={setStars} size={40}/>

      />
      {error && <div style={{fontSize:13, color:B.urgent, marginBottom:10, textAlign:'center'}}>{error}</div>}
      <button
        onClick={submit}
        disabled={sending || stars < 1}

/* ── AUTO CLEANUP (30+ days) — throttled: máx 1 vez por día ── */
async function cleanupOldPhotos(currentUserUid) {
  try {
    // Throttle: solo correr si pasó +22h desde la última limpieza
    const metaSnap = await db.ref('meta/lastCleanup').once('value');
    const lastRun = metaSnap.val() || 0;
    if (Date.now() - lastRun < 22 * 60 * 60 * 1000) return;

    const snap = await db.ref('historial').once('value');
    const historial = snap.val() || {};
    const thirtyDaysAgo = Date.now() - (30 * 24 * 60 * 60 * 1000);
    const dateStr = new Date(thirtyDaysAgo).toISOString().slice(0, 10);
    let cleanedCount = 0;

    for (const [dateKey, deliveries] of Object.entries(historial)) {
      if (dateKey < dateStr && deliveries) {
        const updates = {};
        for (const [dId, d] of Object.entries(deliveries)) {
          if (d && ((d.firma && d.firma !== '[foto eliminada]') || (d.foto && d.foto !== '[foto eliminada]') || (d.fotoAusente && d.fotoAusente !== '[foto eliminada]'))) {
            updates[dId] = {...d, firma: '[foto eliminada]', foto: '[foto eliminada]', fotoAusente: '[foto eliminada]'};
            cleanedCount++;
          }
        }
        if (Object.keys(updates).length > 0) {
          await db.ref('historial/' + dateKey).update(updates);
        }
      }
    }

    // Marcar última corrida
    await db.ref('meta/lastCleanup').set(Date.now());

    if (cleanedCount > 0) {
      db.ref('logs').push({ts: Date.now(), usuario: 'sistema', uid: currentUserUid, accion: 'limpió fotos antiguas', detalle: cleanedCount + ' fotos de más de 30 días eliminadas'});
    }
  } catch (e) {
    console.error('Cleanup error:', e);
  }
}

/* ── METRICS DASHBOARD ── */
function MetricsDashboard({onClose}) {
  const [rawData, setRawData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [rango, setRango] = useState("30d"); // hoy | 7d | 30d | mes | todo
  const [exporting, setExporting] = useState(false);

  useEffect(() => {
    Promise.all([
      db.ref('historial').once('value'),
      db.ref('deliveries').once('value')
    ]).then(([histSnap, todaySnap]) => {
      const historial = histSnap.val() || {};
      const todayRaw = todaySnap.val() || {};
      const todayKey = new Date().toISOString().slice(0,10);
      const allData = {...historial};
      if(Object.keys(todayRaw).length > 0) allData[todayKey] = todayRaw;
      setRawData(allData);
      setLoading(false);
    }).catch(()=>setLoading(false));
  }, []);

  // Aplanar todas las entregas con su fecha
  const flatten = (data) => {
    const out = [];
    Object.entries(data||{}).forEach(([dateKey, dels]) => {
      if(!dels||typeof dels!=='object') return;
      Object.values(dels).forEach(d => { if(d&&typeof d==='object') out.push({...d, _dateKey: dateKey}); });
    });
    return out;
  };

  const getRangeDates = (r) => {
    const end = new Date(); end.setHours(23,59,59,999);
    const start = new Date(); start.setHours(0,0,0,0);
    if(r==="hoy") return {start, end};
    if(r==="7d") { start.setDate(start.getDate()-6); return {start, end}; }
    if(r==="30d") { start.setDate(start.getDate()-29); return {start, end}; }
    if(r==="mes") { start.setDate(1); return {start, end}; }
    return {start: new Date(2020,0,1), end}; // "todo"
  };

  const filterByRange = (deliveries, r) => {
    const {start, end} = getRangeDates(r);
    return deliveries.filter(d => {
      const dk = d._dateKey;
      if(!dk) return false;
      const dt = new Date(dk + 'T00:00:00');
      return dt >= start && dt <= end;
    });
  };

  const calcKpis = (deliveries) => {
    const total = deliveries.length;
    const delivered = deliveries.filter(d=>d.estado==='entregado').length;
    const absent = deliveries.filter(d=>d.estado==='ausente').length;
    const enCamino = deliveries.filter(d=>d.estado==='en_camino').length;
    const pendiente = deliveries.filter(d=>d.estado==='pendiente').length;
    const urgentes = deliveries.filter(d=>d.urgente).length;
    // SLA: tiempo promedio desde creación (id = Date.now() al crear) hasta entrega (entregadoTs)
    const slaArr = deliveries.filter(d=>d.estado==='entregado' && d.id && d.entregadoTs && d.entregadoTs>d.id)
      .map(d=>(d.entregadoTs - d.id)/60000);
    const slaMin = slaArr.length ? Math.round(slaArr.reduce((a,b)=>a+b,0)/slaArr.length) : null;
    // Tiempo promedio ruta (en_camino → llegada)
    const rutaArr = deliveries.filter(d=>d.inicioTs && d.llegadaTs && d.llegadaTs>d.inicioTs)
      .map(d=>(d.llegadaTs - d.inicioTs)/60000).filter(m=>m>0&&m<180);
    const rutaMin = rutaArr.length ? Math.round(rutaArr.reduce((a,b)=>a+b,0)/rutaArr.length) : null;
    // Tiempo promedio en puerta (llegada → entrega)
    const puertaArr = deliveries.filter(d=>d.llegadaTs && d.entregadoTs && d.entregadoTs>d.llegadaTs)
      .map(d=>(d.entregadoTs - d.llegadaTs)/60000).filter(m=>m>=0&&m<120);
    const puertaMin = puertaArr.length ? Math.round(puertaArr.reduce((a,b)=>a+b,0)/puertaArr.length) : null;
    return {
      total, delivered, absent, enCamino, pendiente, urgentes,
      successRate: total>0 ? Math.round((delivered/total)*100) : 0,
      urgRate: total>0 ? Math.round((urgentes/total)*100) : 0,
      slaMin, rutaMin, puertaMin
    };
  };

  const calcChoferes = (deliveries) => {
    const m = {};
    deliveries.forEach(d => {
      const ch = d.entregadoPor || d.intentoPor || null;
      if(!ch) return;
      if(!m[ch]) m[ch] = {nombre:ch, total:0, delivered:0, absent:0, trSum:0, trN:0, tpSum:0, tpN:0};
      m[ch].total++;
      if(d.estado==='entregado') m[ch].delivered++;
      if(d.estado==='ausente') m[ch].absent++;
      if(d.inicioTs && d.llegadaTs && d.llegadaTs>d.inicioTs) {
        const mins = Math.round((d.llegadaTs - d.inicioTs)/60000);
        if(mins>0 && mins<180) { m[ch].trSum+=mins; m[ch].trN++; }
      }
      if(d.llegadaTs && d.entregadoTs && d.entregadoTs>d.llegadaTs) {
        const mins = Math.round((d.entregadoTs - d.llegadaTs)/60000);
        if(mins>=0 && mins<60) { m[ch].tpSum+=mins; m[ch].tpN++; }
      }
    });
    return Object.values(m).map(c => ({
      ...c,
      rate: c.total>0 ? Math.round((c.delivered/c.total)*100) : 0,
      avgRuta: c.trN>0 ? Math.round(c.trSum/c.trN) : null,
      avgPuerta: c.tpN>0 ? Math.round(c.tpSum/c.tpN) : null
    })).sort((a,b)=>b.total-a.total);
  };

  const calcGraph30 = (data) => {
    const buckets = {};
    const today = new Date();
    for(let i=29;i>=0;i--){
      const d = new Date(today); d.setDate(d.getDate()-i);
      buckets[d.toISOString().slice(0,10)] = {total:0, entregado:0, ausente:0};
    }
    Object.entries(data||{}).forEach(([dk, dels]) => {
      if(!buckets[dk] || !dels || typeof dels!=='object') return;
      Object.values(dels).forEach(d => {
        if(!d) return;
        buckets[dk].total++;
        if(d.estado==='entregado') buckets[dk].entregado++;
        if(d.estado==='ausente') buckets[dk].ausente++;
      });
    });
    return Object.entries(buckets).map(([date,v])=>({date, ...v}));
  };

  const calcTopClientes = (deliveries, n=5) => {
    const m = {};
    deliveries.forEach(d => {
      const c = (d.cliente||"").trim();
      if(!c) return;
      if(!m[c]) m[c] = {cliente:c, total:0, delivered:0};
      m[c].total++;
      if(d.estado==='entregado') m[c].delivered++;
    });
    return Object.values(m).sort((a,b)=>b.total-a.total).slice(0,n);
  };

  const calcHorarios = (deliveries) => {
    // Distribución de creación por hora (0-23)
    const hours = Array.from({length:24}, (_,i)=>({h:i, total:0}));
    deliveries.forEach(d => {
      if(d.id && typeof d.id==='number') {
        const h = new Date(d.id).getHours();
        if(h>=0 && h<24) hours[h].total++;
      }
    });
    return hours;
  };

  const calcHorariosEntrega = (deliveries) => {
    // Distribución de ENTREGAS REALES por hora (entregadoTs)
    const hours = Array.from({length:24}, (_,i)=>({h:i, total:0}));
    deliveries.forEach(d => {
      if(d.estado==='entregado' && d.entregadoTs && typeof d.entregadoTs==='number') {
        const h = new Date(d.entregadoTs).getHours();
        if(h>=0 && h<24) hours[h].total++;
      }
    });
    return hours;
  };

  const calcVehiculos = (deliveries) => {
    const m = {};
    deliveries.forEach(d => {
      const v = d.vehiculo || null;
      if(!v) return;
      if(!m[v]) m[v] = {vehiculo:v, total:0, delivered:0, absent:0};
      m[v].total++;
      if(d.estado==='entregado') m[v].delivered++;
      if(d.estado==='ausente') m[v].absent++;
    });
    return Object.values(m).map(v => ({
      ...v,
      rate: v.total>0 ? Math.round((v.delivered/v.total)*100) : 0
    })).sort((a,b)=>b.total-a.total);
  };

  const parseZona = (dir) => {
    if(!dir || typeof dir!=='string') return null;
    // Toma la segunda parte tras la primera coma (ej: "18 de Julio 1234, Centro, Montevideo" -> "Centro")
    const parts = dir.split(',').map(s=>s.trim()).filter(Boolean);
    if(parts.length >= 2) {
      const candidate = parts[1];
      // Descartar si es un departamento o país
      if(/uruguay|montevideo|canelones|maldonado|departamento/i.test(candidate) && parts.length>=3) {
        return parts[2];
      }
      return candidate;
    }
    return null;
  };

  const calcZonas = (deliveries, n=5) => {
    const m = {};
    deliveries.forEach(d => {
      const z = parseZona(d.direccion);
      if(!z) return;
      if(!m[z]) m[z] = {zona:z, total:0, delivered:0, absent:0};
      m[z].total++;
      if(d.estado==='entregado') m[z].delivered++;
      if(d.estado==='ausente') m[z].absent++;
    });
    return Object.values(m).map(z => ({
      ...z,
      absRate: z.total>0 ? Math.round((z.absent/z.total)*100) : 0
    })).sort((a,b)=>b.total-a.total).slice(0,n);
  };

  const calcEvolucionMeses = (data) => {
    // Últimos 6 meses agregados por mes
    const buckets = [];
    const today = new Date();
    for(let i=5;i>=0;i--){
      const d = new Date(today.getFullYear(), today.getMonth()-i, 1);
      const key = d.toISOString().slice(0,7); // YYYY-MM
      buckets.push({key, label: d.toLocaleDateString('es-UY',{month:'short'}), total:0, entregado:0, ausente:0});
    }
    const byKey = {};
    buckets.forEach(b => byKey[b.key] = b);
    Object.entries(data||{}).forEach(([dk, dels]) => {
      const mk = (dk||"").slice(0,7);
      if(!byKey[mk] || !dels || typeof dels!=='object') return;
      Object.values(dels).forEach(d => {
        if(!d) return;
        byKey[mk].total++;
        if(d.estado==='entregado') byKey[mk].entregado++;
        if(d.estado==='ausente') byKey[mk].ausente++;
      });
    });
    return buckets;
  };

  const calcProyeccionMes = (data) => {
    const today = new Date();
    const mesKey = today.toISOString().slice(0,7);
    const diaActual = today.getDate();
    const diasDelMes = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
    let totalMes = 0;
    Object.entries(data||{}).forEach(([dk, dels]) => {
      if(!dk.startsWith(mesKey) || !dels || typeof dels!=='object') return;
      totalMes += Object.keys(dels).length;
    });
    const proyeccion = diaActual>0 ? Math.round((totalMes/diaActual)*diasDelMes) : totalMes;
    return {totalMes, diaActual, diasDelMes, proyeccion};
  };

  const exportExcel = () => {
    if(!rawData || !window.XLSX) { alert("Excel no disponible todavía"); return; }
    setExporting(true);
    try {
      const all = flatten(rawData);
      const filtered = filterByRange(all, rango);
      const rows = filtered.map(d => ({
        "Fecha": d._dateKey || "",
        "Hora creación": d.id ? new Date(d.id).toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit'}) : "",
        "Cliente": d.cliente || "",
        "Dirección": d.direccion || "",
        "Teléfono": d.telefono || "",
        "Bultos": d.bultos || "",
        "Vehículo": d.vehiculo || "",
        "Urgente": d.urgente ? "SÍ" : "",
        "Estado": d.estado || "",
        "Creado por": d.creadoPor || "",
        "Entregado por": d.entregadoPor || "",
        "Receptor": d.receptor || "",
        "Hora entrega": d.entregadoTs ? new Date(d.entregadoTs).toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit'}) : "",
        "Tiempo total (min)": (d.id && d.entregadoTs) ? Math.round((d.entregadoTs - d.id)/60000) : "",
        "Tracking": d.tracking || "",
        "Notas": d.notas || ""
      }));
      const wb = window.XLSX.utils.book_new();
      const ws = window.XLSX.utils.json_to_sheet(rows);
      // Ancho de columnas
      ws["!cols"] = [
        {wch:12},{wch:12},{wch:22},{wch:32},{wch:14},{wch:8},{wch:12},{wch:10},
        {wch:12},{wch:18},{wch:18},{wch:18},{wch:12},{wch:16},{wch:12},{wch:40}
      ];
      const rangoLabel = rango==="hoy"?"Hoy":rango==="7d"?"Ultimos-7d":rango==="30d"?"Ultimos-30d":rango==="mes"?"Mes-actual":"Todo";
      window.XLSX.utils.book_append_sheet(wb, ws, "Entregas");
      const fname = `MundoM-Reparto-${rangoLabel}-${new Date().toISOString().slice(0,10)}.xlsx`;
      window.XLSX.writeFile(wb, fname);
    } catch(e){ console.error(e); alert("Error generando Excel: "+e.message); }
    setExporting(false);
  };

  if(loading) return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()} style={{textAlign:'center',padding:40}}>
        <div style={{fontSize:14,color:B.gray}}>Cargando métricas...</div>
      </div>
    </div>
  );

  const allFlat = flatten(rawData);
  const filtered = filterByRange(allFlat, rango);
  const kpis = calcKpis(filtered);
  const choferes = calcChoferes(filtered);
  const vehiculos = calcVehiculos(filtered);
  const graph30 = calcGraph30(rawData);
  const topClientes = calcTopClientes(filtered);
  const zonas = calcZonas(filtered, 6);
  const horarios = calcHorarios(filtered);
  const horariosEntrega = calcHorariosEntrega(filtered);
  const evolucionMeses = calcEvolucionMeses(rawData);
  const proyMes = calcProyeccionMes(rawData);
  // Hoy siempre
  const hoyFlat = filterByRange(allFlat, "hoy");
  const hoyKpis = calcKpis(hoyFlat);
  // Comparativa (mismo rango pero período anterior)
  let prevKpis = null;
  if(rango==="7d" || rango==="30d" || rango==="mes") {
    const dias = rango==="7d"?7:rango==="30d"?30:new Date().getDate();
    const prevEnd = new Date(); prevEnd.setDate(prevEnd.getDate()-dias); prevEnd.setHours(23,59,59,999);
    const prevStart = new Date(prevEnd); prevStart.setDate(prevStart.getDate()-dias+1); prevStart.setHours(0,0,0,0);
    const prev = allFlat.filter(d => {
      const dt = new Date((d._dateKey||"")+'T00:00:00');
      return dt >= prevStart && dt <= prevEnd;
    });
    prevKpis = calcKpis(prev);
  }

  const maxBar30 = Math.max(...graph30.map(x=>x.total), 1);
  const maxHr = Math.max(...horarios.map(x=>x.total), 1);
  const maxHrE = Math.max(...horariosEntrega.map(x=>x.total), 1);
  const maxMes = Math.max(...evolucionMeses.map(x=>x.total), 1);
  const fmtD = (s) => { const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('es-UY',{day:'numeric',month:'short'}); };
  const delta = (cur, prev) => {
    if(prev===null || prev===undefined || prev===0) return null;
    const d = Math.round(((cur-prev)/prev)*100);
    return d;
  };
  const rangoLabel = rango==="hoy"?"hoy":rango==="7d"?"últimos 7 días":rango==="30d"?"últimos 30 días":rango==="mes"?"este mes":"todo el historial";

  const Chip = ({val, label}) => (
    <button onClick={()=>setRango(val)} style={{background:rango===val?B.orange:B.white, color:rango===val?'#fff':B.dark, border:`1.5px solid ${rango===val?B.orange:B.border}`, borderRadius:999, padding:'6px 14px', fontSize:13, fontWeight:800, cursor:'pointer', fontFamily:'inherit'}}>{label}</button>
  );
  const KpiCard = ({label, value, sub, color=B.dark, deltaVal}) => (
    <Card><div style={{fontSize:10,color:B.gray,fontWeight:800,textTransform:'uppercase',marginBottom:4,letterSpacing:.3}}>{label}</div><div style={{fontSize:26,fontWeight:900,color}}>{value}</div>{sub&&<div style={{fontSize:11,color:B.gray,marginTop:2}}>{sub}</div>}{deltaVal!==undefined&&deltaVal!==null&&<div style={{fontSize:11,fontWeight:800,color:deltaVal>0?B.success:deltaVal<0?B.urgent:B.gray,marginTop:2}}>{deltaVal>0?'▲':deltaVal<0?'▼':'='} {Math.abs(deltaVal)}% vs anterior</div>}</Card>
  );

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()} style={{maxHeight:'94vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <span style={{fontSize:18,fontWeight:800,color:B.dark}}>📊 Dashboard de Métricas</span>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer'}}>✕</button>
        </div>

        {/* Sección HOY - siempre visible */}
        <div style={{background:'linear-gradient(135deg, #FFF3E8 0%, #FFE5CE 100%)',borderRadius:14,padding:14,marginBottom:16,border:`1.5px solid #FCD9B6`}}>
          <div style={{fontSize:11,color:B.orange,fontWeight:900,textTransform:'uppercase',marginBottom:8,letterSpacing:.5}}>🕐 Hoy</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8}}>
            <div style={{textAlign:'center'}}><div style={{fontSize:22,fontWeight:900,color:B.dark}}>{hoyKpis.total}</div><div style={{fontSize:10,color:B.gray,fontWeight:700}}>Total</div></div>
            <div style={{textAlign:'center'}}><div style={{fontSize:22,fontWeight:900,color:B.success}}>{hoyKpis.delivered}</div><div style={{fontSize:10,color:B.gray,fontWeight:700}}>Entregadas</div></div>
            <div style={{textAlign:'center'}}><div style={{fontSize:22,fontWeight:900,color:B.info}}>{hoyKpis.enCamino}</div><div style={{fontSize:10,color:B.gray,fontWeight:700}}>En camino</div></div>
            <div style={{textAlign:'center'}}><div style={{fontSize:22,fontWeight:900,color:'#D97706'}}>{hoyKpis.pendiente}</div><div style={{fontSize:10,color:B.gray,fontWeight:700}}>Pendientes</div></div>
            <div style={{textAlign:'center'}}><div style={{fontSize:22,fontWeight:900,color:B.absent}}>{hoyKpis.absent}</div><div style={{fontSize:10,color:B.gray,fontWeight:700}}>Ausentes</div></div>
          </div>
        </div>

        {/* Filtros de rango */}
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14,alignItems:'center'}}>
          <span style={{fontSize:11,color:B.gray,fontWeight:800,textTransform:'uppercase',marginRight:4}}>Rango:</span>
          <Chip val="hoy" label="Hoy"/>
          <Chip val="7d" label="7 días"/>
          <Chip val="30d" label="30 días"/>
          <Chip val="mes" label="Este mes"/>
          <Chip val="todo" label="Todo"/>
        </div>

        {/* KPIs del rango */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          <KpiCard label="Total entregas" value={kpis.total} sub={rangoLabel} color={B.orange} deltaVal={prevKpis?delta(kpis.total, prevKpis.total):null}/>
          <KpiCard label="Tasa de éxito" value={kpis.successRate+'%'} sub={`${kpis.delivered} entregadas`} color={B.success} deltaVal={prevKpis?delta(kpis.successRate, prevKpis.successRate):null}/>
          <KpiCard label="Ausentes" value={kpis.absent} sub={kpis.total>0?`${Math.round(kpis.absent/kpis.total*100)}% del total`:''} color={B.absent}/>
          <KpiCard label="Urgentes" value={kpis.urgentes} sub={`${kpis.urgRate}% del total`} color={B.urgent}/>
          <KpiCard label="⏱ Tiempo total prom." value={kpis.slaMin!=null?kpis.slaMin+' min':'—'} sub="desde carga hasta entrega" color={B.info}/>
          <KpiCard label="🚚 Tiempo viaje prom." value={kpis.rutaMin!=null?kpis.rutaMin+' min':'—'} sub="inicio → llegada al cliente" color={B.info}/>
          <KpiCard label="📦 Tiempo en puerta prom." value={kpis.puertaMin!=null?kpis.puertaMin+' min':'—'} sub="llegada → entrega confirmada" color={B.orange}/>
        </div>

        {/* Botón exportar */}
        <Btn onClick={exportExcel} full variant="primary" disabled={exporting||kpis.total===0}>
          {exporting?"Generando...":`⬇ Exportar Excel (${kpis.total} entregas)`}
        </Btn>
        <div style={{height:16}}/>

        {/* Gráfico 30 días */}
        <Card style={{marginBottom:14}}>
          <div style={{fontSize:12,color:B.gray,fontWeight:800,textTransform:'uppercase',marginBottom:12}}>Últimos 30 días</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:2,height:100,marginBottom:6}}>
            {graph30.map((d,i)=>(
              <div key={i} title={`${d.date}: ${d.total} entregas`} style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'flex-end',height:'100%'}}>
                <div style={{width:'100%',background:B.absent,height:d.ausente>0?Math.max((d.ausente/maxBar30)*90,2)+'px':'0px'}}/>
                <div style={{width:'100%',background:B.success,height:d.entregado>0?Math.max((d.entregado/maxBar30)*90,2)+'px':'0px'}}/>
                <div style={{width:'100%',background:B.orange,height:(d.total-d.entregado-d.ausente)>0?Math.max(((d.total-d.entregado-d.ausente)/maxBar30)*90,2)+'px':'0px',borderRadius:'2px 2px 0 0'}}/>
              </div>
            ))}
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:B.gray}}><span>{fmtD(graph30[0].date)}</span><span>{fmtD(graph30[14].date)}</span><span>hoy</span></div>
          <div style={{display:'flex',gap:12,marginTop:10,fontSize:11}}>
            <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,background:B.success,borderRadius:2}}/>Entregadas</span>
            <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,background:B.orange,borderRadius:2}}/>Otras</span>
            <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,background:B.absent,borderRadius:2}}/>Ausentes</span>
          </div>
        </Card>

        {/* Evolución últimos 6 meses */}
        <Card style={{marginBottom:14}}>
          <div style={{fontSize:12,color:B.gray,fontWeight:800,textTransform:'uppercase',marginBottom:12}}>Evolución · Últimos 6 meses</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:6,height:100,marginBottom:6}}>
            {evolucionMeses.map((m,i)=>(
              <div key={i} title={`${m.label}: ${m.total} entregas`} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',height:'100%'}}>
                <div style={{fontSize:10,fontWeight:700,color:B.dark,marginBottom:2}}>{m.total>0?m.total:''}</div>
                <div style={{width:'100%',display:'flex',flexDirection:'column',justifyContent:'flex-end',height:'85%'}}>
                  <div style={{width:'100%',background:B.absent,height:m.ausente>0?Math.max((m.ausente/maxMes)*80,2)+'px':'0px'}}/>
                  <div style={{width:'100%',background:B.success,height:m.entregado>0?Math.max((m.entregado/maxMes)*80,2)+'px':'0px'}}/>
                  <div style={{width:'100%',background:B.orange,height:(m.total-m.entregado-m.ausente)>0?Math.max(((m.total-m.entregado-m.ausente)/maxMes)*80,2)+'px':'0px',borderRadius:'3px 3px 0 0'}}/>
                </div>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:0,fontSize:10,color:B.gray,marginTop:2}}>
            {evolucionMeses.map((m,i)=>(<div key={i} style={{flex:1,textAlign:'center',textTransform:'capitalize',fontWeight:700}}>{m.label}</div>))}
          </div>
        </Card>

        {/* Proyección fin de mes (solo si rango=mes) */}
        {rango==="mes" && proyMes.totalMes > 0 && (
          <Card style={{marginBottom:14, background:'linear-gradient(135deg, #FFF3E8 0%, #FFE5CE 100%)', border:`1.5px solid ${B.orangeBorder}`}}>
            <div style={{fontSize:11,color:B.orange,fontWeight:900,textTransform:'uppercase',marginBottom:8,letterSpacing:.5}}>🎯 Proyección fin de mes</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,textAlign:'center'}}>
              <div><div style={{fontSize:22,fontWeight:900,color:B.dark}}>{proyMes.totalMes}</div><div style={{fontSize:10,color:B.gray,fontWeight:700}}>Acumulado hoy</div></div>
              <div><div style={{fontSize:22,fontWeight:900,color:B.orange}}>{proyMes.proyeccion}</div><div style={{fontSize:10,color:B.gray,fontWeight:700}}>Proyección mes</div></div>
              <div><div style={{fontSize:22,fontWeight:900,color:B.info}}>{proyMes.diaActual}/{proyMes.diasDelMes}</div><div style={{fontSize:10,color:B.gray,fontWeight:700}}>Día del mes</div></div>
            </div>
            <div style={{fontSize:11,color:B.gray,marginTop:8,textAlign:'center',fontStyle:'italic'}}>Estimación lineal según ritmo actual.</div>
          </Card>
        )}

        {/* Distribución por hora: CARGA vs ENTREGA (lado a lado) */}
        <Card style={{marginBottom:14}}>
          <div style={{fontSize:12,color:B.gray,fontWeight:800,textTransform:'uppercase',marginBottom:12}}>Horarios · Carga vs Entrega</div>
          <div style={{fontSize:10,color:B.gray,fontWeight:700,marginBottom:4}}>📥 Cargadas por hora</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:1,height:50,marginBottom:4}}>
            {horarios.map((h,i)=>(
              <div key={i} title={`${h.h}:00 — ${h.total} cargadas`} style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'flex-end',height:'100%'}}>
                <div style={{width:'100%',background:B.orange,height:h.total>0?Math.max((h.total/maxHr)*45,2)+'px':'1px',borderRadius:'2px 2px 0 0',opacity:h.total>0?1:.15}}/>
              </div>
            ))}
          </div>
          <div style={{fontSize:10,color:B.gray,fontWeight:700,marginBottom:4,marginTop:8}}>✅ Entregadas por hora</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:1,height:50,marginBottom:4}}>
            {horariosEntrega.map((h,i)=>(
              <div key={i} title={`${h.h}:00 — ${h.total} entregadas`} style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'flex-end',height:'100%'}}>
                <div style={{width:'100%',background:B.success,height:h.total>0?Math.max((h.total/maxHrE)*45,2)+'px':'1px',borderRadius:'2px 2px 0 0',opacity:h.total>0?1:.15}}/>
              </div>
            ))}
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:B.gray,marginTop:4}}><span>0h</span><span>6h</span><span>12h</span><span>18h</span><span>23h</span></div>
        </Card>

        {/* Top clientes */}
        {topClientes.length > 0 && (
          <Card style={{marginBottom:14}}>
            <div style={{fontSize:12,color:B.gray,fontWeight:800,textTransform:'uppercase',marginBottom:12}}>Top clientes · {rangoLabel}</div>
            {topClientes.map((c,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:i<topClientes.length-1?`1px solid ${B.border}`:'none'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,minWidth:0,flex:1}}>
                  <div style={{fontSize:13,fontWeight:900,color:B.orange,minWidth:18}}>#{i+1}</div>
                  <div style={{fontWeight:700,color:B.dark,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.cliente}</div>
                </div>
                <div style={{display:'flex',gap:10,alignItems:'center',flexShrink:0}}>
                  <span style={{fontSize:11,color:B.gray}}>{c.total} envíos</span>
                  <span style={{fontSize:11,color:B.success,fontWeight:700}}>{c.total>0?Math.round(c.delivered/c.total*100):0}%</span>
                </div>
              </div>
            ))}
          </Card>
        )}

        {/* Ranking de vehículos */}
        {vehiculos.length > 0 && (
          <Card style={{marginBottom:14}}>
            <div style={{fontSize:12,color:B.gray,fontWeight:800,textTransform:'uppercase',marginBottom:12}}>Vehículos · {rangoLabel}</div>
            {vehiculos.map((v,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:i<vehiculos.length-1?`1px solid ${B.border}`:'none'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,minWidth:0,flex:1}}>
                  <div style={{fontSize:18}}>{VE[v.vehiculo]||'🚐'}</div>
                  <div style={{fontWeight:700,color:B.dark,fontSize:13}}>{v.vehiculo}</div>
                </div>
                <div style={{display:'flex',gap:10,alignItems:'center',flexShrink:0}}>
                  <span style={{fontSize:11,color:B.gray}}>{v.total} entregas</span>
                  <span style={{fontSize:11,color:v.rate>=80?B.success:v.rate>=60?B.orange:B.urgent,fontWeight:800}}>{v.rate}%</span>
                </div>
              </div>
            ))}
          </Card>
        )}

        {/* Top zonas/barrios */}
        {zonas.length > 0 && (
          <Card style={{marginBottom:14}}>
            <div style={{fontSize:12,color:B.gray,fontWeight:800,textTransform:'uppercase',marginBottom:12}}>Zonas · {rangoLabel}</div>
            {zonas.map((z,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:i<zonas.length-1?`1px solid ${B.border}`:'none'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,minWidth:0,flex:1}}>
                  <div style={{fontSize:13,fontWeight:900,color:B.orange,minWidth:18}}>#{i+1}</div>
                  <div style={{fontWeight:700,color:B.dark,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{z.zona}</div>
                </div>
                <div style={{display:'flex',gap:10,alignItems:'center',flexShrink:0}}>
                  <span style={{fontSize:11,color:B.gray}}>{z.total} envíos</span>
                  {z.absRate>0 && <span style={{fontSize:11,color:z.absRate>=30?B.urgent:B.absent,fontWeight:700}} title="% ausentismo">🏠 {z.absRate}%</span>}
                </div>
              </div>
            ))}
          </Card>
        )}

        {/* Desempeño por chofer */}
        {choferes.length > 0 && (
          <Card style={{marginBottom:14}}>
            <div style={{fontSize:12,color:B.gray,fontWeight:800,textTransform:'uppercase',marginBottom:12}}>Desempeño por chofer · {rangoLabel}</div>
            {choferes.map((c,i)=>(
              <div key={i} style={{borderBottom:i<choferes.length-1?`1px solid ${B.border}`:'none',paddingBottom:12,marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <div style={{fontWeight:700,color:B.dark,fontSize:14}}>{c.nombre}</div>
                  <div style={{fontWeight:900,color:c.rate>=80?B.success:c.rate>=60?B.orange:B.urgent,fontSize:16}}>{c.rate}%</div>
                </div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:6}}>
                  <span style={{fontSize:11,color:B.gray}}>{c.total} entregas</span>
                  <span style={{fontSize:11,color:B.success}}>✅ {c.delivered}</span>
                  {c.absent>0&&<span style={{fontSize:11,color:B.absent}}>🏠 {c.absent}</span>}
                </div>
                <div style={{background:B.bg,borderRadius:4,height:6,overflow:'hidden',marginBottom:6}}>
                  <div style={{width:c.rate+'%',height:'100%',background:c.rate>=80?B.success:c.rate>=60?B.orange:B.urgent,borderRadius:4,transition:'width .4s'}}/>
                </div>
                <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
                  {c.avgRuta!=null&&<div style={{fontSize:11,color:B.info}}>🚗 Ruta prom.: <strong>{c.avgRuta} min</strong></div>}
                  {c.avgPuerta!=null&&<div style={{fontSize:11,color:B.info}}>🚪 Puerta prom.: <strong>{c.avgPuerta} min</strong></div>}
                </div>
              </div>
            ))}
          </Card>
        )}

        {kpis.total===0&&(
          <div style={{textAlign:'center',padding:'30px 0',color:B.gray,fontSize:14}}>
            <div style={{fontSize:32,marginBottom:8}}>📭</div>
            <div>No hay entregas en este rango.</div>
            <div style={{fontSize:12,marginTop:4}}>Probá con un rango más amplio.</div>
          </div>
        )}

        <Btn onClick={onClose} full variant="secondary">Cerrar</Btn>
      </div>
    </div>
  );
}

function App() {
  const [authReady,setAuthReady]=useState(false);
  const [currentUser,setCurrentUser]=useState(null);
  const [noUsers,setNoUsers]=useState(false);
  const [adminView,setAdminView]=useState("admin"); // "admin"|"deliveries"|"chofer_view"
  const [adminChoferVehicle,setAdminChoferVehicle]=useState("Camión");
  const [screen,setScreen]=useState("list");
  const [deliveries,setDeliveries]=useState([]);
  const [synced,setSynced]=useState(false);
  const [selId,setSelId]=useState(null);
  const [lastR,setLastR]=useState("");
  const [lastSig,setLastSig]=useState(null);
  const [lastFoto,setLastFoto]=useState(null);
  const [notifPerm,setNotifPerm]=useState(typeof Notification!=="undefined"?Notification.permission:"denied");
  const prevDeliveriesRef=useRef({});
  const currentUserRef=useRef(null);
  useEffect(()=>{ currentUserRef.current=currentUser; },[currentUser]);

  // Helper: mostrar notificación al chofer (usa SW si está disponible)
  const showChoferNotif=(title,body,tag)=>{
    try{
      if(typeof Notification==="undefined"||Notification.permission!=="granted") return;
      const icon=window.MUNDOM_LOGO||undefined;
      const opts={body,tag,icon,badge:icon,vibrate:[200,100,200],renotify:true};
      if(navigator.serviceWorker&&navigator.serviceWorker.ready){
        navigator.serviceWorker.ready.then(reg=>{
          if(reg&&reg.showNotification) reg.showNotification(title,opts);
          else { try{new Notification(title,opts);}catch(e){} }
        }).catch(()=>{ try{new Notification(title,opts);}catch(e){} });
      }else{
        try{new Notification(title,opts);}catch(e){}
      }
    }catch(e){console.error("showChoferNotif:",e);}
  };

  useEffect(()=>{
    const ref=db.ref("deliveries");
    // keepSynced: mantiene el nodo cacheado localmente → el chofer ve las entregas aunque pierda señal
    try { ref.keepSynced(true); } catch(e) { /* ignore */ }
    let firstSnap=true;
    ref.on("value",snap=>{
      const val=snap.val();
      const arr=val?Object.values(val).filter(Boolean):[];
      setDeliveries(arr);
      setSynced(true);
      // Notificaciones locales para choferes (después del snapshot inicial)
      try{
        const u=currentUserRef.current;
        if(!firstSnap && u && u.rol==="chofer" && typeof Notification!=="undefined" && Notification.permission==="granted"){
          const prev=prevDeliveriesRef.current;
          arr.forEach(d=>{
            // Solo entregas de mi vehículo
            if(d.vehiculo && u.vehiculo && d.vehiculo!==u.vehiculo) return;
            const p=prev[d.id];
            if(!p){
              if(d.estado==="pendiente") showChoferNotif("🆕 Nuevo pedido asignado", `${d.cliente} · ${d.direccion||""}`, "new-"+d.id);
            }else{
              if(d.urgente && !p.urgente) showChoferNotif("🚨 Pedido marcado URGENTE", d.cliente, "urg-"+d.id);
              if(p.estado!=="pendiente" && d.estado==="pendiente") showChoferNotif("🔁 Reasignado a tu ruta", `${d.cliente} · ${d.direccion||""}`, "rea-"+d.id);
              if(p.vehiculo!==d.vehiculo && d.vehiculo===u.vehiculo) showChoferNotif("📦 Pedido asignado a tu vehículo", `${d.cliente} · ${d.direccion||""}`, "asg-"+d.id);
            }
          });
        }
      }catch(e){console.error("notif compare:",e);}
      // Actualizar snapshot previo
      const np={};
      arr.forEach(d=>{ np[d.id]={estado:d.estado,vehiculo:d.vehiculo,urgente:!!d.urgente,cliente:d.cliente}; });
      prevDeliveriesRef.current=np;
      firstSnap=false;
    });
    return()=>ref.off();
  },[]);

  // Solicitar permiso de notificaciones al chofer (soft prompt)
  const requestNotifPermission=async()=>{
    if(typeof Notification==="undefined") { alert("Tu navegador no soporta notificaciones."); return; }
    try{
      const perm=await Notification.requestPermission();
      setNotifPerm(perm);
      if(perm==="granted") showChoferNotif("✅ Notificaciones activadas", "Te avisaremos cuando llegue un nuevo pedido", "welcome-"+Date.now());
    }catch(e){console.error(e);}
  };

  useEffect(()=>{
    const timeout=setTimeout(()=>{ setAuthReady(true); },8000); // fallback: show login after 8s if Firebase hangs
    const unsub=auth.onAuthStateChanged(async fbUser=>{
      clearTimeout(timeout);
      try{
        if(fbUser){
          const snap=await db.ref("usuarios/"+fbUser.uid).once("value");
          const profile=snap.val();
          if(profile&&profile.activo){
            setCurrentUser({uid:fbUser.uid,...profile});
            if(profile.rol === 'admin') { cleanupOldPhotos(fbUser.uid); }
            setNoUsers(false);
          }else{
            await auth.signOut();
            setCurrentUser(null);
            const allSnap=await db.ref("usuarios").once("value");
            setNoUsers(!allSnap.val());
          }
        }else{
          setCurrentUser(null);
          try{
            const allSnap=await db.ref("usuarios").once("value");
            setNoUsers(!allSnap.val());
          }catch(e){ setNoUsers(false); }
        }
      }catch(e){ console.error('Auth init error:',e); }
      setAuthReady(true);
    });
    return()=>{ clearTimeout(timeout); unsub(); };
  },[]);

  useEffect(()=>{
    if(!currentUser)return;
    const ref=db.ref("usuarios/"+currentUser.uid+"/activo");
    ref.on("value",snap=>{
      if(snap.val()===false){auth.signOut();}
    });
    return()=>ref.off();
  },[currentUser]);

  const logAction=(accion,detalle="")=>{
    if(!currentUser)return;
    db.ref("logs").push({ts:Date.now(),usuario:currentUser.nombre,uid:currentUser.uid,accion,detalle});
  };

  const save=(newDeliveries)=>{
    const obj={};newDeliveries.forEach(d=>{obj[d.id]=d;});
    db.ref("deliveries").set(obj);setDeliveries(newDeliveries);
  };

  const sel=deliveries.find(d=>d.id===selId);
  const upStatus=(id,e)=>{
    const d=deliveries.find(x=>x.id===id);
    if(d?.tracking) db.ref("tracking/"+d.tracking).update({estado:e,lastUpdate:Date.now()});
    const update={estado:e};
    if(e==="en_camino") update.inicioTs=Date.now();
    db.ref("deliveries/"+id).update(update);
  };
  const addDel=d=>save([...deliveries,d]);
  const editDel=(d)=>{
    save(deliveries.map(x=>x.id===d.id?d:x));
    logAction("editó entrega",`"${d.cliente}"`);
  };
  const deleteDel=id=>save(deliveries.filter(d=>d.id!==id));
  const togUrg=(id,u)=>save(deliveries.map(d=>d.id===id?{...d,urgente:u}:d));
  const reorder=(id,dir)=>{const s=[...deliveries].sort((a,b)=>a.orden-b.orden);const i=s.findIndex(d=>d.id===id);const ni=i+dir;if(ni<0||ni>=s.length)return;const ao=s[i].orden,bo=s[ni].orden;save(deliveries.map(d=>d.id===s[i].id?{...d,orden:bo}:d.id===s[ni].id?{...d,orden:ao}:d));};
  const batchReorder=updates=>save(deliveries.map(d=>{const u=updates.find(u=>u.id===d.id);return u?{...d,orden:u.orden}:d;}));

  const confirm=(id,r,sig,foto)=>{
    const d=deliveries.find(x=>x.id===id);
    const ts=Date.now();
    db.ref("deliveries/"+id).update({estado:"entregado",firmado:true,receptor:r,firma:sig,foto:foto||null,entregadoPor:currentUser.nombre,entregadoTs:ts});
    // Update public tracking node with confirmation info (no firma/foto for privacy)
    if(d?.tracking) db.ref("tracking/"+d.tracking).update({estado:"entregado",receptor:r,entregadoPor:currentUser.nombre,entregadoTs:ts,lastUpdate:ts});
    logAction("confirmó entrega",`"${d?.cliente}" → receptor: ${r}`);
    setLastR(r);setLastSig(sig);setLastFoto(foto||null);setScreen("success");
  };

  const markAbsent=(id,retryOrFoto)=>{
    if(retryOrFoto==="retry"){
      const d=deliveries.find(x=>x.id===id);
      if(d?.tracking) db.ref("tracking/"+d.tracking).update({estado:"pendiente",lastUpdate:Date.now()});
      db.ref("deliveries/"+id).update({estado:"pendiente",fotoAusente:null});
      logAction("reintentó entrega",`"${d?.cliente}"`);
    }else{
      const d=deliveries.find(x=>x.id===id);
      if(d?.tracking) db.ref("tracking/"+d.tracking).update({estado:"ausente",lastUpdate:Date.now()});
      db.ref("deliveries/"+id).update({estado:"ausente",intentoPor:currentUser.nombre,intentoTs:Date.now(),fotoAusente:retryOrFoto||null});
      logAction("no estaba en casa",`"${d?.cliente}" en ${d?.direccion}`);
      setScreen("list");
    }
  };

  const resetDay=async()=>{
    if(deliveries.length===0)return;
    const dateKey=new Date().toISOString().slice(0,10);
    const obj={};deliveries.forEach(d=>{obj[d.id]=d;});
    await db.ref("historial/"+dateKey).set(obj);
    await db.ref("deliveries").remove();
    logAction("cerró el día",`${deliveries.length} pedidos archivados`);
  };

  const logout=async()=>{
    db.ref("logs").push({ts:Date.now(),usuario:currentUser?.nombre,uid:currentUser?.uid,accion:"salió del sistema",detalle:""});
    await auth.signOut();
    setCurrentUser(null);setScreen("list");setSelId(null);setAdminView("admin");
  };

  // Only wait for auth — deliveries load in background after login
  if(!authReady) return (
    <div style={{minHeight:"100vh",background:`linear-gradient(150deg,${B.orange} 0%,#C44D00 100%)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}}>
      <div style={{filter:"drop-shadow(0 8px 24px rgba(0,0,0,.25))"}}><MundoLogo size={100}/></div>
      <div style={{color:"white",fontSize:17,fontWeight:700}}>Conectando...</div>
      <div style={{width:48,height:48,border:"4px solid rgba(255,255,255,.3)",borderTop:"4px solid white",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
    </div>
  );

  if(noUsers) return <SetupScreen onCreated={(uid,profile)=>{setCurrentUser({uid,...profile});setNoUsers(false);}}/>;
  if(!currentUser) return <LoginScreen onLogged={(uid,profile)=>{setCurrentUser({uid,...profile});}} onNoUsers={()=>setNoUsers(true)}/>;

  const userName=currentUser.nombre;

  const backToAdmin=()=>{setAdminView("admin");setScreen("list");setSelId(null);};

  if(currentUser.rol==="admin"&&adminView==="admin")
    return <AdminScreen currentUser={currentUser} onLogout={logout} onGoToDeliveries={()=>setAdminView("deliveries")} onGoToChoferView={v=>{setAdminChoferVehicle(v);setAdminView("chofer_view");setScreen("list");setSelId(null);}}/>;

  if(currentUser.rol==="encargada"||(currentUser.rol==="admin"&&adminView==="deliveries"))
    return <EncargadaScreen deliveries={deliveries} userName={userName} isAdmin={currentUser.rol==="admin"} onAdd={addDel} onUpdateStatus={upStatus} onToggleUrgent={togUrg} onReorder={reorder} onBatchReorder={batchReorder} onDelete={deleteDel} onLogout={currentUser.rol==="admin"?()=>setAdminView("admin"):logout} onLog={logAction} onResetDay={resetDay} onEdit={editDel}/>;

  if(currentUser.rol==="admin"&&adminView==="chofer_view"){
    if(screen==="list") return <ChoferScreen deliveries={deliveries} vehicle={adminChoferVehicle} userName={currentUser.nombre} isAdmin={true} onSelectDelivery={id=>{setSelId(id);setScreen("detail");}} onLogout={backToAdmin} notifPerm={notifPerm} onEnableNotif={requestNotifPermission}/>;
    if(screen==="detail"&&sel) return <DeliveryDetail delivery={sel} onBack={()=>setScreen("list")} onStart={()=>{upStatus(sel.id,"en_camino");logAction("inició entrega",`"${sel.cliente}"`);try{const phone=wpNum(sel.telefono);if(phone&&phone.length>5){const trackUrl=sel.tracking?(window.location.href.split('#')[0]+"#track/"+sel.tracking):"";const msg="Hola! Soy del equipo de Mundo M. Tu pedido está en camino y llegamos a "+sel.direccion+" pronto."+(trackUrl?" Podés seguir tu entrega en tiempo real aquí: "+trackUrl:"")+" Te avisamos cuando estemos cerca. Gracias!";window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg),"_blank");}}catch(e){console.error("auto-wa en camino:",e);}}} onSign={()=>setScreen("signature")} onAbsent={(v)=>{markAbsent(sel.id,v);if(v!=="retry")setSelId(null);}}/>;
    if(screen==="signature"&&sel) return <SignatureScreen delivery={sel} onConfirm={confirm} onBack={()=>setScreen("detail")}/>;
    if(screen==="success"&&sel) return <SuccessScreen delivery={sel} receptor={lastR} firma={lastSig} foto={lastFoto} deliveries={deliveries} userName={currentUser.nombre} onDone={()=>{setScreen("list");setSelId(null);}}/>;
  }

  if(currentUser.rol==="chofer"){
    const vehicle=currentUser.vehiculo;
    if(screen==="list") return <ChoferScreen deliveries={deliveries} vehicle={vehicle} userName={userName} onSelectDelivery={id=>{setSelId(id);setScreen("detail");}} onLogout={logout} notifPerm={notifPerm} onEnableNotif={requestNotifPermission}/>;
    if(screen==="detail"&&sel) return <DeliveryDetail delivery={sel} onBack={()=>setScreen("list")} onStart={()=>{upStatus(sel.id,"en_camino");logAction("inició entrega",`"${sel.cliente}"`);try{const phone=wpNum(sel.telefono);if(phone&&phone.length>5){const trackUrl=sel.tracking?(window.location.href.split('#')[0]+"#track/"+sel.tracking):"";const msg="Hola! Soy del equipo de Mundo M. Tu pedido está en camino y llegamos a "+sel.direccion+" pronto."+(trackUrl?" Podés seguir tu entrega en tiempo real aquí: "+trackUrl:"")+" Te avisamos cuando estemos cerca. Gracias!";window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg),"_blank");}}catch(e){console.error("auto-wa en camino:",e);}}} onSign={()=>setScreen("signature")} onAbsent={(v)=>{markAbsent(sel.id,v);if(v!=="retry")setSelId(null);}}/>;
    if(screen==="signature"&&sel) return <SignatureScreen delivery={sel} onConfirm={confirm} onBack={()=>setScreen("detail")}/>;
    if(screen==="success"&&sel) return <SuccessScreen delivery={sel} receptor={lastR} firma={lastSig} foto={lastFoto} deliveries={deliveries} userName={currentUser.nombre} onDone={()=>{setScreen("list");setSelId(null);}}/>;
  }

  return <div style={{padding:40,textAlign:"center",color:B.gray}}>Rol no reconocido. <button onClick={logout} style={{color:B.orange,background:"none",border:"none",cursor:"pointer",fontWeight:700}}>Salir</button></div>;
}


const AppWrapper = () => {
  const [hash, setHash] = useState(window.location.hash);
  useEffect(() => {
    const handler = () => setHash(window.location.hash);
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);
  
  if (hash.startsWith('#track/')) {
    const code = hash.slice(7);
    return <PublicTrackingView trackingCode={code} />;
  }
  return <App />;
};

ReactDOM.createRoot(document.getElementById("root")).render(<AppWrapper/>);

</script>
</body>
</html>
