<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
body { background: #F4F5F7; }
button, input, select, textarea { font-family: inherit; }
.shell        { min-height: 100vh; background: #F4F5F7; }
.top-bar      { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 14px 20px; position: sticky; top: 0; z-index: 10; }
.top-bar-in   { display: flex; align-items: center; gap: 12px; max-width: 1200px; margin: 0 auto; width: 100%; }
.page-wrap    { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
.main-grid    { display: flex; flex-direction: column; gap: 20px; }
.panel-left   { min-width: 0; }
.panel-right  { display: none; }
@media (min-width: 860px) {
  .page-wrap   { padding: 32px 40px; }
  .main-grid   { flex-direction: row; align-items: flex-start; gap: 32px; }
  .panel-left  { flex: 1; min-width: 0; }
  .panel-right { display: block; width: 400px; flex-shrink: 0; position: sticky; top: 90px; }
  .mobile-add-btn { display: none !important; }
  .stats-grid  { grid-template-columns: repeat(4, 1fr) !important; }
  .role-cards  { flex-direction: row !important; max-width: 760px !important; }
  .chofer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@media (min-width: 860px) {
  .delivery-list { max-height: calc(100vh - 200px); overflow-y: auto; padding-right: 4px; }
  .delivery-list::-webkit-scrollbar { width: 4px; }
  .delivery-list::-webkit-scrollbar-track { background: transparent; }
  .delivery-list::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 99px; }
}
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; display:flex; align-items:flex-end; }
.modal-sheet   { background:white; border-radius:20px 20px 0 0; width:100%; max-height:85vh; overflow-y:auto; padding:24px 20px; animation:fadeIn .2s ease; }
@media(min-width:600px){ .modal-overlay{align-items:center;} .modal-sheet{max-width:560px;margin:auto;border-radius:20px;max-height:75vh;} }
.sugg-btn:hover { background: #FFF3E8 !important; }
.online-dot   { width: 10px; height: 10px; border-radius: 50%; background: #10B981; animation: pulse 2s infinite; }
.offline-dot  { width: 10px; height: 10px; border-radius: 50%; background: #EF4444; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.toast { position: fixed; bottom: 20px; left: 20px; background: white; border-radius: 12px; padding: 14px 16px; box-shadow: 0 4px 12px rgba(0,0,0,.15); z-index: 999; animation: slideUp .3s ease; font-weight: 700; }
@keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.track-timeline { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
.track-step { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.track-dot { width: 16px; height: 16px; border-radius: 50%; border: 3px solid #E5E7EB; background: white; }
.track-dot.active { background: #10B981; border-color: #10B981; }
.track-line { flex: 1; height: 3px; background: #E5E7EB; margin: 0 8px; }

.vehicle-marker-icon { font-size: 28px; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,.3)); }
.leaflet-container { font-family: inherit; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.4)} }
</style>

function generateTrackingCode() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let code = '';
  for(let i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
  return code;
}

function generateBarChart(data, maxVal) {
  const w = 300, h = 80;
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  const itemW = w / data.length;
  const scale = h / maxVal;
  data.forEach((v, i) => {
    const barH = v * scale;
    ctx.fillStyle = '#FA6E0F';
    ctx.fillRect(i * itemW + 5, h - barH, itemW - 10, barH);
  });
  return canvas.toDataURL();
}

const compressImage=(src,maxW=900,q=0.72)=>new Promise(res=>{
  const img=new Image();
  img.onload=()=>{
    let w=img.width,h=img.height;
    if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
    const c=document.createElement("canvas");
    c.width=w;c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    res(c.toDataURL("image/jpeg",q));
  };
  img.src=src;
});


// Service Worker (PWA) — registro con detección de nueva versión
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then((reg) => {
      // Chequear updates al volver a foco
      reg.update().catch(()=>{});
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) reg.update().catch(()=>{});
      });

      const notifyUpdate = (worker) => {
        if (!worker) return;
        // Mostrar banner naranja discreto pidiendo al usuario recargar
        if (document.getElementById("mm-update-banner")) return;
        const bar = document.createElement("div");
        bar.id = "mm-update-banner";
        bar.style.cssText = "position:fixed;left:16px;right:16px;bottom:16px;z-index:9999;background:#FA6E0F;color:#fff;padding:14px 16px;border-radius:14px;box-shadow:0 6px 20px rgba(0,0,0,.2);display:flex;align-items:center;gap:12px;font-weight:700;font-family:Nunito,sans-serif;";
        bar.innerHTML = '<span style="flex:1">Nueva versión disponible</span><button id="mm-update-btn" style="background:#fff;color:#FA6E0F;border:0;border-radius:10px;padding:8px 14px;font-weight:800;cursor:pointer;font-family:inherit">Actualizar</button>';
        document.body.appendChild(bar);
        document.getElementById("mm-update-btn").onclick = () => {
          worker.postMessage("SKIP_WAITING");
        };
      };

      if (reg.waiting) notifyUpdate(reg.waiting);
      reg.addEventListener("updatefound", () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", () => {
          if (nw.state === "installed" && navigator.serviceWorker.controller) {
            notifyUpdate(nw);
          }
        });
      });

      let reloaded = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (reloaded) return;
        reloaded = true;
        window.location.reload();
      });
    }).catch((e) => console.warn("SW no registrado:", e));
  });
}

function OnlineIndicator() {
  const [online, setOnline] = useState(navigator.onLine);
  useEffect(() => {
    const handleOnline = () => setOnline(true);
    const handleOffline = () => setOnline(false);
    window.addEventListener('online', handleOnline);
    window.addEventListener('offline', handleOffline);
    return () => {
      window.removeEventListener('online', handleOnline);
      window.removeEventListener('offline', handleOffline);
    };
  }, []);
  return <div className={online ? 'online-dot' : 'offline-dot'} title={online ? 'Conexión establecida' : 'Modo sin conexión'} />;
}

  return <div className="toast" style={{background: bg, color, borderLeft: `4px solid ${color}`}}>{message}</div>;
}

/* ── PHOTO CAPTURE ── */
function PhotoCapture({onCapture, label="Sacar foto (opcional)"}) {
  const inputRef=useRef(null);
  const [preview,setPreview]=useState(null);
  const handleFile=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      const compressed=await compressImage(ev.target.result);
      setPreview(compressed);
      onCapture(compressed);
    };
    reader.readAsDataURL(file);
  };
  const clear=()=>{setPreview(null);onCapture(null);if(inputRef.current)inputRef.current.value="";};
  return (
    <div style={{marginBottom:14}}>
      <input ref={inputRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleFile}/>
      {!preview?(
        <button onClick={()=>inputRef.current.click()} style={{width:"100%",border:`1.5px dashed ${B.border}`,borderRadius:12,padding:"14px",cursor:"pointer",background:B.bg,color:B.gray,fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          📷 {label}
        </button>
      ):(
        <div>
          <img src={preview} alt="Foto" style={{width:"100%",borderRadius:12,border:`1.5px solid ${B.border}`,display:"block",maxHeight:220,objectFit:"cover"}}/>
          <button onClick={clear} style={{marginTop:6,width:"100%",background:"none",border:`1.5px solid ${B.border}`,borderRadius:10,padding:"8px",cursor:"pointer",color:B.gray,fontSize:13,fontWeight:700}}>🗑 Cambiar foto</button>
        </div>
      )}
    </div>
  );
}

/* ── ADDRESS AUTOCOMPLETE ── */
function AddressField({label,value,onChange,required}) {
  const [query,setQuery]=useState(value||"");
  const [suggestions,setSuggestions]=useState([]);
  const [loading,setLoading]=useState(false);
  const [open,setOpen]=useState(false);
  const [confirmed,setConfirmed]=useState(false);
  const timer=useRef(null);
  const wrapRef=useRef(null);
  useEffect(()=>{ setQuery(value||""); },[value]);
  useEffect(()=>{
    const handler=e=>{ if(wrapRef.current&&!wrapRef.current.contains(e.target))setOpen(false); };
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[]);
  const search=async(q)=>{
    if(!q||q.length<4){setSuggestions([]);setOpen(false);return;}
    setLoading(true);
    try{
      const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q+", Montevideo, Uruguay")}&format=json&limit=5&countrycodes=uy&addressdetails=1`;
      const r=await fetch(url,{headers:{"Accept-Language":"es","User-Agent":"MundoM-Reparto/1.0"}});
      const data=await r.json();
      setSuggestions(data);
      setOpen(data.length>0);
    }catch(e){setSuggestions([]);}
    setLoading(false);
  };
  const formatAddr=(item)=>{
    const a=item.address||{};
    const street=a.road||a.pedestrian||a.street||"";
    const num=a.house_number||"";
    const barrio=a.suburb||a.neighbourhood||a.quarter||"";
    let main=street+(num?" "+num:"");
    if(!main.trim())main=item.display_name.split(",")[0];
    const sub=barrio&&barrio!=="Montevideo"?barrio:"Montevideo";
    return{main:main.trim(),sub};
  };
  const handleChange=(v)=>{
    setQuery(v);onChange(v);setConfirmed(false);
    clearTimeout(timer.current);
    timer.current=setTimeout(()=>search(v),600);
  };
  const select=(item)=>{
    const{main,sub}=formatAddr(item);
    const full=main+(sub&&sub!=="Montevideo"?", "+sub:"");
    setQuery(full);onChange(full);
    setSuggestions([]);setOpen(false);setConfirmed(true);
  };
  const hasSugg=open&&suggestions.length>0;
  return (
    <div ref={wrapRef} style={{marginBottom:14,position:"relative"}}>
      {label&&<label style={{display:"block",fontSize:13,fontWeight:700,color:B.dark,marginBottom:6}}>
        {label}{required&&<span style={{color:B.orange}}> *</span>}
        {confirmed&&<span style={{color:B.success,marginLeft:6,fontSize:12,fontWeight:700}}>confirmada</span>}
      </label>}
      <div style={{position:"relative"}}>
        <input type="text" value={query} onChange={e=>handleChange(e.target.value)} onFocus={()=>suggestions.length>0&&setOpen(true)} placeholder="Calle y número, barrio"
          style={{width:"100%",boxSizing:"border-box",padding:"12px 44px 12px 14px",fontSize:15,
            border:`1.5px solid ${confirmed?B.success:hasSugg?B.orange:B.border}`,
            borderRadius:hasSugg?"10px 10px 0 0":10,color:B.dark,outline:"none",background:"white"}}/>
        {loading&&<div style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",width:18,height:18,border:`2px solid ${B.border}`,borderTop:`2px solid ${B.orange}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>}
        {!loading&&confirmed&&<span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",color:B.success,fontSize:18}}>✓</span>}
        {!loading&&!confirmed&&query&&<button onClick={()=>{setQuery("");onChange("");setSuggestions([]);setOpen(false);setConfirmed(false);}} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#9CA3AF",fontSize:17,lineHeight:1,padding:2}}>✕</button>}
      </div>
      {hasSugg&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"white",border:`1.5px solid ${B.orange}`,borderTop:"none",borderRadius:"0 0 10px 10px",zIndex:50,overflow:"hidden",boxShadow:"0 8px 24px rgba(0,0,0,.12)"}}>
          {suggestions.map((s,i)=>{
            const{main,sub}=formatAddr(s);
            return(
              <button key={s.place_id} className="sugg-btn" onClick={()=>select(s)}
                style={{display:"block",width:"100%",textAlign:"left",padding:"10px 14px",background:"white",border:"none",borderBottom:i<suggestions.length-1?`1px solid ${B.border}`:"none",cursor:"pointer"}}>
                <div style={{fontSize:14,fontWeight:700,color:B.dark}}>📍 {main}</div>
                <div style={{fontSize:12,color:B.gray,marginTop:2}}>{sub}</div>
              </button>
            );
          })}
          <div style={{padding:"6px 14px",fontSize:11,color:B.gray,borderTop:`1px solid ${B.border}`,textAlign:"right"}}>OpenStreetMap</div>
        </div>
      )}
    </div>
  );
}

/* ── GOOGLE SIGN-IN HELPER ── */
const signInWithGoogle=async()=>{
  const provider=new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({prompt:"select_account"});
  const cred=await auth.signInWithPopup(provider);
  const {uid,email:gEmail,displayName}=cred.user;
  // Check existing profile
  let snap=await db.ref("usuarios/"+uid).once("value");
  let profile=snap.val();
  if(!profile){
    // Search pending_google by email
    const pSnap=await db.ref("pending_google").once("value");
    const pending=pSnap.val()||{};
    const match=Object.entries(pending).find(([k,u])=>u.email.toLowerCase()===gEmail.toLowerCase());
    if(match){
      const[key,pp]=match;
      if(!pp.activo){await auth.signOut();throw new Error("Tu cuenta está desactivada. Contactá al administrador.");}
      profile={...pp,googleUid:uid};
      await db.ref("usuarios/"+uid).set(profile);
      await db.ref("pending_google/"+key).remove();
      db.ref("logs").push({ts:Date.now(),usuario:profile.nombre,uid,accion:"primera sesión con Google",detalle:gEmail});
    }else{
      await auth.signOut();
      throw new Error("Tu cuenta Google ("+gEmail+") no está registrada. Contactá al administrador.");
    }
  }
  if(!profile.activo){await auth.signOut();throw new Error("Tu cuenta está desactivada. Contactá al administrador.");}
  return{uid,profile};
};

function LoginScreen({onLogged,onNoUsers}) {
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [showPw,setShowPw]=useState(false);
  const [loading,setLoading]=useState(false);
  const [gLoading,setGLoading]=useState(false);
  const [error,setError]=useState("");
  const [forgotMode,setForgotMode]=useState(false);
  const [forgotEmail,setForgotEmail]=useState("");
  const [forgotSent,setForgotSent]=useState(false);
  const [forgotLoading,setForgotLoading]=useState(false);

  const handleLogin=async()=>{
    if(!email||!password){setError("Completá email y contraseña.");return;}
    setLoading(true);setError("");
    try{
      const cred=await auth.signInWithEmailAndPassword(email.trim(),password);
      const snap=await db.ref("usuarios/"+cred.user.uid).once("value");
      const profile=snap.val();
      if(!profile){await auth.signOut();throw new Error("Usuario no configurado. Contactá al administrador.");}
      if(!profile.activo){await auth.signOut();throw new Error("Tu cuenta está desactivada. Contactá al administrador.");}
      onLogged(cred.user.uid,profile);
    }catch(e){
      let msg=e.message;
      if(e.code==="auth/user-not-found"||e.code==="auth/wrong-password"||e.code==="auth/invalid-credential"||e.code==="auth/invalid-login-credentials")msg="Email o contraseña incorrectos.";
      if(e.code==="auth/invalid-email")msg="El email no es válido.";
      if(e.code==="auth/too-many-requests")msg="Demasiados intentos. Esperá unos minutos.";
      setError(msg);
    }
    setLoading(false);
  };

  const handleGoogle=async()=>{
    setGLoading(true);setError("");
    try{
      const{uid,profile}=await signInWithGoogle();
      onLogged(uid,profile);
    }catch(e){
      if(e.code!=="auth/popup-closed-by-user"&&e.code!=="auth/cancelled-popup-request")setError(e.message);
    }
    setGLoading(false);
  };

  const handleForgot=async()=>{
    if(!forgotEmail.trim()){setError("Ingresá tu email.");return;}
    setForgotLoading(true);setError("");
    try{
      await auth.sendPasswordResetEmail(forgotEmail.trim());
      setForgotSent(true);
    }catch(e){
      let msg="Error al enviar el email.";
      if(e.code==="auth/user-not-found")msg="No hay ninguna cuenta con ese email.";
      if(e.code==="auth/invalid-email")msg="El email no es válido.";
      setError(msg);
    }
    setForgotLoading(false);
  };

  if(forgotMode) return (
    <div style={{minHeight:"100vh",background:`linear-gradient(150deg,${B.orange} 0%,#C44D00 100%)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{margin:"0 auto 16px",filter:"drop-shadow(0 8px 24px rgba(0,0,0,.25))"}}><MundoLogo size={90}/></div>
        <div style={{color:"white",fontSize:22,fontWeight:900}}>Recuperar contraseña</div>
        <div style={{color:"rgba(255,255,255,.72)",fontSize:14,marginTop:6}}>Te enviamos un link para restablecer tu contraseña</div>
      </div>
      <div style={{width:"100%",maxWidth:380,background:"white",borderRadius:24,padding:28,boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
        {forgotSent?(
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:52,marginBottom:12}}>📧</div>
            <div style={{fontSize:17,fontWeight:800,color:B.dark,marginBottom:8}}>Email enviado</div>
            <div style={{fontSize:14,color:B.gray,marginBottom:20,lineHeight:1.6}}>Revisá tu bandeja de entrada (y la carpeta de spam) en <strong>{forgotEmail}</strong>.</div>
            <button onClick={()=>{setForgotMode(false);setForgotSent(false);setForgotEmail("");}} style={{width:"100%",background:B.orange,color:"white",border:"none",borderRadius:14,padding:"14px",cursor:"pointer",fontSize:16,fontWeight:800}}>← Volver al login</button>
          </div>
        ):(
          <>
            <div style={{marginBottom:16}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,color:B.dark,marginBottom:6}}>Tu email</label>
              <input type="email" value={forgotEmail} onChange={e=>setForgotEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleForgot()} placeholder="tu@email.com" autoFocus
                style={{width:"100%",boxSizing:"border-box",padding:"13px 16px",fontSize:15,border:`1.5px solid ${B.border}`,borderRadius:12,color:B.dark,outline:"none"}}/>
            </div>

        </div>

/* ── SETUP SCREEN (first admin) ── */
function SetupScreen({onCreated}) {
  const [mode,setMode]=useState("choose"); // "choose" | "password" | "google_name"
  const [nombre,setNombre]=useState("");
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [googleUser,setGoogleUser]=useState(null);

  const handleSetupPassword=async()=>{
    if(!nombre.trim()||!email.trim()||password.length<6){setError("Completá todos los campos. La contraseña debe tener al menos 6 caracteres.");return;}
    setLoading(true);setError("");
    try{
      const cred=await auth.createUserWithEmailAndPassword(email.trim(),password);
      const profile={nombre:nombre.trim(),email:email.trim(),rol:"admin",activo:true,creadoTs:Date.now()};
      await db.ref("usuarios/"+cred.user.uid).set(profile);
      onCreated(cred.user.uid,profile);
    }catch(e){
      let msg=e.message;
      if(e.code==="auth/email-already-in-use")msg="Ese email ya está registrado.";
      if(e.code==="auth/weak-password")msg="La contraseña debe tener al menos 6 caracteres.";
      if(e.code==="auth/invalid-email")msg="El email no es válido.";
      setError(msg);
    }
    setLoading(false);
  };

  const handleSetupGoogle=async()=>{
    setLoading(true);setError("");
    try{
      const provider=new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({prompt:"select_account"});
      const cred=await auth.signInWithPopup(provider);
      const{uid,email:gEmail,displayName}=cred.user;
      setGoogleUser({uid,email:gEmail});
      setNombre(displayName||"");
      setMode("google_name");
    }catch(e){
      if(e.code!=="auth/popup-closed-by-user")setError(e.message);
    }
    setLoading(false);
  };

  const handleConfirmGoogleAdmin=async()=>{
    if(!nombre.trim()){setError("Ingresá tu nombre completo.");return;}
    setLoading(true);setError("");
    try{
      const profile={nombre:nombre.trim(),email:googleUser.email,rol:"admin",activo:true,creadoTs:Date.now()};
      await db.ref("usuarios/"+googleUser.uid).set(profile);
      onCreated(googleUser.uid,profile);
    }catch(e){setError(e.message);}
    setLoading(false);
  };

  const header=(
    <div style={{textAlign:"center",marginBottom:32}}>
      <div style={{margin:"0 auto 16px",filter:"drop-shadow(0 8px 24px rgba(0,0,0,.25))"}}><MundoLogo size={90}/></div>
      <div style={{color:"white",fontSize:22,fontWeight:900}}>Configuración Inicial</div>
      <div style={{color:"rgba(255,255,255,.72)",fontSize:14,marginTop:6}}>Creá la cuenta del administrador del sistema</div>
    </div>
  );

  if(mode==="google_name") return (
    <div style={{minHeight:"100vh",background:`linear-gradient(150deg,${B.orange} 0%,#C44D00 100%)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      {header}
      <div style={{width:"100%",maxWidth:380,background:"white",borderRadius:24,padding:28,boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
        <div style={{background:B.successBg,borderRadius:12,padding:"10px 14px",marginBottom:16,fontSize:13,color:B.success,fontWeight:700}}>
          Cuenta Google vinculada: {googleUser?.email}
        </div>
        <Field label="Tu nombre completo" value={nombre} onChange={setNombre} placeholder="Ej: Rony Melo" required autoFocus/>
        {error&&<div style={{background:"#FEF2F2",border:"1.5px solid #FECACA",borderRadius:10,padding:"10px 14px",fontSize:13,color:B.urgent,fontWeight:700,marginBottom:16}}>{error}</div>}
        <button onClick={handleConfirmGoogleAdmin} disabled={loading} style={{width:"100%",background:loading?"#E5E7EB":B.orange,color:loading?B.gray:"white",border:"none",borderRadius:14,padding:"15px",cursor:loading?"default":"pointer",fontSize:17,fontWeight:900}}>
          {loading?"Creando...":"Crear Administrador →"}
        </button>
      </div>
    </div>
  );

  if(mode==="password") return (
    <div style={{minHeight:"100vh",background:`linear-gradient(150deg,${B.orange} 0%,#C44D00 100%)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      {header}
      <div style={{width:"100%",maxWidth:380,background:"white",borderRadius:24,padding:28,boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
        <Field label="Nombre completo" value={nombre} onChange={setNombre} placeholder="Ej: Rony Melo" required autoFocus/>
        <Field label="Email" value={email} onChange={setEmail} type="email" placeholder="admin@mundom.com.uy" required/>
        <Field label="Contraseña (mín. 6 caracteres)" value={password} onChange={setPassword} type="password" placeholder="••••••••" required/>
        {error&&<div style={{background:"#FEF2F2",border:"1.5px solid #FECACA",borderRadius:10,padding:"10px 14px",fontSize:13,color:B.urgent,fontWeight:700,marginBottom:16}}>{error}</div>}
        <button onClick={handleSetupPassword} disabled={loading} style={{width:"100%",background:loading?"#E5E7EB":B.orange,color:loading?B.gray:"white",border:"none",borderRadius:14,padding:"15px",cursor:loading?"default":"pointer",fontSize:17,fontWeight:900,marginBottom:10}}>
          {loading?"Creando...":"Crear Administrador →"}
        </button>
        <button onClick={()=>{setMode("choose");setError("");}} style={{width:"100%",background:"none",border:`1.5px solid ${B.border}`,borderRadius:14,padding:"12px",cursor:"pointer",fontSize:14,fontWeight:700,color:B.gray}}>← Volver</button>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(150deg,${B.orange} 0%,#C44D00 100%)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      {header}
      <div style={{width:"100%",maxWidth:380,background:"white",borderRadius:24,padding:28,boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
        <div style={{fontSize:14,color:B.gray,textAlign:"center",marginBottom:20}}>¿Cómo querés acceder al sistema?</div>
        {error&&<div style={{background:"#FEF2F2",border:"1.5px solid #FECACA",borderRadius:10,padding:"10px 14px",fontSize:13,color:B.urgent,fontWeight:700,marginBottom:14}}>{error}</div>}
        <button onClick={handleSetupGoogle} disabled={loading} style={{width:"100%",background:"white",color:B.dark,border:`1.5px solid ${B.border}`,borderRadius:14,padding:"13px",cursor:loading?"default":"pointer",fontSize:15,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,.08)"}}>
          {loading?<><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span></>:<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/><path fill="#34A853" d="M6.3 14.7l7 5.1C15 16.1 19.2 13 24 13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 16.3 2 9.7 7.4 6.3 14.7z"/><path fill="#FBBC05" d="M24 46c5.9 0 10.9-2 14.6-5.4l-6.7-5.5C30 36.6 27.2 37 24 37c-6.1 0-10.7-3.1-11.8-7.5l-7 5.4C8.7 41.5 15.8 46 24 46z"/><path fill="#EA4335" d="M44.5 20H24v8.5h11.8c-1.1 3-3.6 5.4-6.8 6.6l6.7 5.5C40 37.1 46 31 46 24c0-1.3-.2-2.7-.5-4z"/></svg>}
          Continuar con Google
        </button>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{flex:1,height:1,background:B.border}}/><span style={{fontSize:12,color:B.gray}}>o</span><div style={{flex:1,height:1,background:B.border}}/>
        </div>
        <button onClick={()=>setMode("password")} style={{width:"100%",background:B.orange,color:"white",border:"none",borderRadius:14,padding:"13px",cursor:"pointer",fontSize:15,fontWeight:800}}>
          Crear con email y contraseña
        </button>
      </div>
    </div>
  );
}

/* ── ADMIN SCREEN ── */
function AdminScreen({currentUser,onLogout,onGoToDeliveries,onGoToChoferView}) {
  const [users,setUsers]=useState([]);
  const [pendingGoogle,setPendingGoogle]=useState([]);
  const [showCreate,setShowCreate]=useState(false);
  const [showMetrics, setShowMetrics] = useState(false);
  const [createMode,setCreateMode]=useState("password"); // "password"|"google"
  const [form,setForm]=useState({nombre:"",email:"",password:"",rol:"encargada",vehiculo:"Camión"});
  const [creating,setCreating]=useState(false);
  const [msg,setMsg]=useState("");
  const [showPw,setShowPw]=useState(false);

  useEffect(()=>{
    const ref=db.ref("usuarios");
    ref.on("value",snap=>{
      const val=snap.val()||{};
      setUsers(Object.entries(val).map(([uid,u])=>({uid,...u})).sort((a,b)=>(a.nombre||"").localeCompare(b.nombre||"")));
    });
    const pRef=db.ref("pending_google");
    pRef.on("value",snap=>{
      const val=snap.val()||{};
      setPendingGoogle(Object.entries(val).map(([key,u])=>({key,...u})));
    });
    return()=>{ref.off();pRef.off();};
  },[]);

  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const resetForm=()=>{setForm({nombre:"",email:"",password:"",rol:"encargada",vehiculo:"Camión"});setShowPw(false);};

  const createUserPassword=async()=>{
    if(!form.nombre.trim()||!form.email.trim()||form.password.length<6){setMsg("❌ Completá todos los campos. Contraseña: mín. 6 caracteres.");return;}
    setCreating(true);setMsg("");
    try{
      const secAuth=getSecondaryAuth();
      const cred=await secAuth.createUserWithEmailAndPassword(form.email.trim(),form.password);
      await db.ref("usuarios/"+cred.user.uid).set({
        nombre:form.nombre.trim(),email:form.email.trim(),
        rol:form.rol,vehiculo:form.rol==="chofer"?form.vehiculo:null,
        activo:true,creadoPor:currentUser.nombre,creadoTs:Date.now()
      });
      db.ref("logs").push({ts:Date.now(),usuario:currentUser.nombre,uid:currentUser.uid,accion:"creó usuario",detalle:`${form.nombre.trim()} (${form.rol})`});
      await secAuth.signOut();
      setMsg("✅ Usuario creado correctamente");
      setShowCreate(false);resetForm();
    }catch(e){
      let m=e.message;
      if(e.code==="auth/email-already-in-use")m="Ese email ya está registrado.";
      if(e.code==="auth/weak-password")m="La contraseña debe tener al menos 6 caracteres.";
      if(e.code==="auth/invalid-email")m="El email no es válido.";
      setMsg("❌ "+m);
    }
    setCreating(false);
  };

  const createUserGoogle=async()=>{
    if(!form.nombre.trim()||!form.email.trim()){setMsg("❌ Completá nombre y email Gmail.");return;}
    const emailLow=form.email.trim().toLowerCase();
    setCreating(true);setMsg("");
    try{
      const key=Date.now().toString();
      await db.ref("pending_google/"+key).set({
        nombre:form.nombre.trim(),email:emailLow,
        rol:form.rol,vehiculo:form.rol==="chofer"?form.vehiculo:null,
        activo:true,creadoPor:currentUser.nombre,creadoTs:Date.now()
      });
      db.ref("logs").push({ts:Date.now(),usuario:currentUser.nombre,uid:currentUser.uid,accion:"registró usuario Google",detalle:`${form.nombre.trim()} — ${emailLow}`});
      setMsg("✅ Usuario de Google registrado. Podrá ingresar con su cuenta Google.");
      setShowCreate(false);resetForm();
    }catch(e){setMsg("❌ "+e.message);}
    setCreating(false);
  };

  const toggleActive=async(uid,activo)=>{
    await db.ref("usuarios/"+uid+"/activo").set(!activo);
    db.ref("logs").push({ts:Date.now(),usuario:currentUser.nombre,uid:currentUser.uid,accion:activo?"desactivó usuario":"activó usuario",detalle:uid});
  };

  const removePending=async(key,nombre)=>{
    if(!window.confirm(`Eliminar usuario Google pendiente "${nombre}"?`))return;
    await db.ref("pending_google/"+key).remove();
  };

  return (
    <div className="shell">
      <div className="top-bar">
        <div className="top-bar-in">
          <OnlineIndicator/>
          <MundoLogo size={44}/>
          <div style={{flex:1}}>
            <div style={{fontSize:18,fontWeight:800,color:B.dark}}>Panel de Administración</div>
            <div style={{fontSize:13,color:B.gray}}>Gestión de usuarios del sistema</div>
          </div>
          <Avatar name={currentUser.nombre} size={32}/>
          <button onClick={onGoToDeliveries} style={{background:B.orangeLight,border:"none",borderRadius:10,padding:"8px 14px",cursor:"pointer",color:B.orange,fontWeight:700,fontSize:13}}>📋 Reparto</button>
          <button onClick={()=>setShowMetrics(true)} style={{background:B.infoBg,border:"none",borderRadius:10,padding:"8px 14px",cursor:"pointer",color:B.info,fontWeight:700,fontSize:13}}>📊 Métricas</button>
          <button onClick={onLogout} style={{background:"none",border:"none",color:B.gray,cursor:"pointer",fontSize:14,fontWeight:700}}>← Salir</button>
        </div>
      </div>
      <div className="page-wrap" style={{maxWidth:700}}>
        {showMetrics&&<MetricsDashboard onClose={()=>setShowMetrics(false)}/>}
      {msg&&<div style={{background:msg.startsWith("✅")?B.successBg:"#FEF2F2",border:`1.5px solid ${msg.startsWith("✅")?"#6EE7B7":"#FECACA"}`,borderRadius:12,padding:"12px 16px",fontSize:14,fontWeight:700,color:msg.startsWith("✅")?B.success:B.urgent,marginBottom:20}}>{msg}</div>}

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <div style={{fontSize:18,fontWeight:800,color:B.dark}}>Usuarios ({users.length})</div>
          <button onClick={()=>{setShowCreate(s=>!s);setMsg("");resetForm();}} style={{background:B.orange,color:"white",border:"none",borderRadius:12,padding:"10px 18px",cursor:"pointer",fontWeight:800,fontSize:14}}>
            {showCreate?"✕ Cancelar":"+ Nuevo usuario"}
          </button>
        </div>

        {showCreate&&(
          <Card style={{marginBottom:20,border:`2px solid ${B.orange}`}}>
            <div style={{fontSize:16,fontWeight:800,color:B.dark,marginBottom:14}}>Crear nuevo usuario</div>
            <div style={{display:"flex",gap:8,marginBottom:18}}>
              {["password","google"].map(m=>(
                <button key={m} onClick={()=>{setCreateMode(m);resetForm();}} style={{flex:1,padding:"10px",borderRadius:10,border:`1.5px solid ${createMode===m?B.orange:B.border}`,background:createMode===m?B.orangeLight:"white",color:createMode===m?B.orange:B.gray,cursor:"pointer",fontWeight:700,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                  {m==="google"?<><svg width="16" height="16" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/><path fill="#34A853" d="M6.3 14.7l7 5.1C15 16.1 19.2 13 24 13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 16.3 2 9.7 7.4 6.3 14.7z"/><path fill="#FBBC05" d="M24 46c5.9 0 10.9-2 14.6-5.4l-6.7-5.5C30 36.6 27.2 37 24 37c-6.1 0-10.7-3.1-11.8-7.5l-7 5.4C8.7 41.5 15.8 46 24 46z"/><path fill="#EA4335" d="M44.5 20H24v8.5h11.8c-1.1 3-3.6 5.4-6.8 6.6l6.7 5.5C40 37.1 46 31 46 24c0-1.3-.2-2.7-.5-4z"/></svg>Con Google</>:"🔑 Con contraseña"}
                </button>
              ))}
            </div>

/* ── LOG MODAL ── */
function LogModal({onClose}) {
  const [logs,setLogs]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    db.ref("logs").orderByChild("ts").limitToLast(100).once("value",snap=>{
      const val=snap.val();
      setLogs(val?Object.values(val).sort((a,b)=>b.ts-a.ts):[]);
      setLoading(false);
    });
  },[]);
  const fmt=ts=>{const d=new Date(ts),now=new Date(),diff=Math.floor((now-d)/1000);if(diff<60)return"hace "+diff+"s";if(diff<3600)return"hace "+Math.floor(diff/60)+"min";if(diff<86400)return d.toLocaleTimeString("es-UY",{hour:"2-digit",minute:"2-digit"});return d.toLocaleDateString("es-UY",{day:"numeric",month:"short"})+" "+d.toLocaleTimeString("es-UY",{hour:"2-digit",minute:"2-digit"});};
  const iconFor=a=>{if(a==="cargó entrega"||a==="cargó entrega urgente")return"📦";if(a==="confirmó entrega")return"✅";if(a==="inició entrega")return"▶";if(a==="eliminó")return"🗑";if(a==="marcó urgente")return"🚨";if(a==="optimizó ruta")return"🚀";if(a==="no estaba en casa")return"🏠";if(a.includes("cerró el día"))return"🌙";if(a==="creó usuario")return"👤";if(a.includes("activó usuario"))return"🔑";return"📋";};
  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-sheet">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div style={{fontSize:18,fontWeight:800,color:B.dark}}>Registro de Actividad</div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:B.gray,fontSize:22}}>✕</button>
        </div>
        {loading&&<div style={{textAlign:"center",padding:"40px 0",color:B.gray}}>Cargando…</div>}
        {!loading&&logs.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:B.gray}}><div style={{fontSize:40,marginBottom:10}}>📋</div>Sin actividad aún</div>}
        {logs.map((l,i)=>(
          <div key={i} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"10px 0",borderBottom:`1px solid ${B.border}`}}>
            <div style={{width:34,height:34,borderRadius:"50%",background:B.orangeLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{iconFor(l.accion)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:700,color:B.dark}}><span style={{color:B.orange}}>{l.usuario}</span> {l.accion}</div>
              {l.detalle&&<div style={{fontSize:13,color:B.gray,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.detalle}</div>}
            </div>
            <div style={{fontSize:11,color:B.gray,flexShrink:0,marginTop:2}}>{fmt(l.ts)}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── DAY RESET MODAL ── */

  const stats={total:deliveries.length,pendiente:deliveries.filter(d=>d.estado==="pendiente").length,en_camino:deliveries.filter(d=>d.estado==="en_camino").length,entregado:deliveries.filter(d=>d.estado==="entregado").length,ausente:deliveries.filter(d=>d.estado==="ausente").length};
  const filtered=vTab==="todos"?deliveries:deliveries.filter(d=>d.vehiculo===vTab);
  const active=[...filtered].filter(d=>d.estado!=="entregado"&&d.estado!=="ausente").sort((a,b)=>{if(a.urgente&&!b.urgente)return -1;if(!a.urgente&&b.urgente)return 1;return a.orden-b.orden;});
  const absentList=[...filtered].filter(d=>d.estado==="ausente");
  const delivered=[...filtered].filter(d=>d.estado==="entregado");
  const today=new Date().toLocaleDateString("es-UY",{weekday:"long",day:"numeric",month:"long"});

  const handleOptimize=async()=>{
    const pending=active.filter(d=>!d.urgente);
    if(pending.length<2){setOptMsg("Necesitás al menos 2 paradas no urgentes para optimizar.");setTimeout(()=>setOptMsg(""),4000);return;}
    setOptimizing(true);setOptMsg("Iniciando optimización...");
    const sleep=ms=>new Promise(r=>setTimeout(r,ms));
    const geocode=async(addr)=>{const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1&countrycodes=uy`,{headers:{"Accept-Language":"es","User-Agent":"MundoM-Reparto/1.0"}});const d=await r.json();return d.length?[parseFloat(d[0].lon),parseFloat(d[0].lat)]:null;};
    try{
      setOptMsg("Localizando punto de partida...");
      const originCoord=await geocode(ORIGIN);
      if(!originCoord)throw new Error("No se pudo localizar el punto de partida");
      await sleep(1200);
      const geocoded=[];
      for(let i=0;i<pending.length;i++){setOptMsg(`Localizando parada ${i+1}/${pending.length}: ${pending[i].cliente}...`);const coord=await geocode(pending[i].direccion+", Montevideo, Uruguay");geocoded.push({...pending[i],coord});if(i<pending.length-1)await sleep(1200);}
      const valid=geocoded.filter(d=>d.coord);
      if(valid.length<2)throw new Error("No se encontraron suficientes direcciones.");
      setOptMsg(`Calculando ruta para ${valid.length} paradas...`);
      const coordStr=[originCoord,...valid.map(d=>d.coord)].map(c=>`${c[0]},${c[1]}`).join(";");
      const res=await fetch(`https://router.project-osrm.org/trip/v1/driving/${coordStr}?roundtrip=true&source=first`);
      const data=await res.json();
      if(data.code!=="Ok")throw new Error("Error en el servicio de ruteo.");
      const orderMap=new Array(data.waypoints.length);
      data.waypoints.forEach((w,i)=>{orderMap[w.waypoint_index]=i;});
      const updates=[];
      for(let pos=1;pos<orderMap.length;pos++){const inputIdx=orderMap[pos];const d=valid[inputIdx-1];if(d)updates.push({id:d.id,orden:pos});}
      onBatchReorder(updates);
      onLog("optimizó ruta",`${updates.length} paradas reordenadas`);
      setOptMsg(`Ruta optimizada — ${updates.length} paradas reordenadas`);
      setTimeout(()=>setOptMsg(""),5000);
    }catch(e){setOptMsg(`Error: ${e.message}`);setTimeout(()=>setOptMsg(""),6000);}
    setOptimizing(false);
  };

  const openForm=(urgent)=>{setForm({...empty,urgente:urgent});setMode(urgent?"urgent":"normal");};
  const handleSave=()=>{
    if(!form.cliente||!form.direccion)return;
    const trackingCode = generateTrackingCode();
    const hora=form.hora||(form.urgente?"HOY":"—");
    const d={id:Date.now(),...form,bultos:parseInt(form.bultos)||1,estado:"pendiente",orden:deliveries.length+1,firmado:false,hora,creadoPor:userName,tracking:trackingCode};
    onAdd(d);
    // Store full public-safe info in tracking node (public read, no firma/foto)
    db.ref("tracking/"+trackingCode).set({id:d.id,cliente:form.cliente,direccion:form.direccion,vehiculo:form.vehiculo||"",hora,bultos:d.bultos,estado:"pendiente",ts:Date.now()});
    onLog(form.urgente?"cargó entrega urgente":"cargó entrega",`"${form.cliente}" → ${form.direccion} (${form.vehiculo})`);
    setForm(empty);setMode(null);
  };

  const DeliveryCard=({d,exp})=>{
    const isAbsent=d.estado==="ausente";
    return (
      <Card urgent={d.urgente&&!isAbsent} onClick={()=>setExpandedId(exp?null:d.id)}
        style={isAbsent?{background:B.absentBg,border:`1.5px solid ${B.absentBorder}`}:{}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
          <div style={{width:36,height:36,flexShrink:0,borderRadius:"50%",background:isAbsent?"#DDD6FE":d.urgente?B.urgentBg:B.orangeLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:isAbsent?18:d.urgente?18:14,fontWeight:800,color:isAbsent?B.absent:d.urgente?B.urgent:B.orange}}>
            {isAbsent?"🏠":d.urgente?"🚨":d.orden}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",justifyContent:"space-between"}}>
              <div style={{fontSize:15,fontWeight:800,color:isAbsent?B.absent:d.urgente?B.urgent:B.dark}}>{d.cliente}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{d.urgente&&!isAbsent&&<UrgBadge/>}<Badge status={d.estado}/></div>
            </div>
            <div style={{fontSize:13,color:isAbsent?B.absent:B.gray,marginTop:4}}>📍 {d.direccion}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:10,marginTop:6,fontSize:12,color:B.gray}}>
              <span>{VE[d.vehiculo]||"🚛"} {d.vehiculo}</span>
              <span>📦 {d.bultos} bulto{d.bultos>1?"s":""}</span>
              {d.hora&&d.hora!=="—"&&<span>🕐 {d.hora}</span>}
              {d.creadoPor&&<span style={{color:B.orange,fontWeight:700}}>👤 {d.creadoPor}</span>}
              {d.tracking&&<span style={{color:B.info,fontWeight:700,fontFamily:'monospace',fontSize:11}}>#{d.tracking}</span>}
              {isAbsent&&d.intentoPor&&<span style={{color:B.absent,fontWeight:700}}>Intentó: {d.intentoPor}</span>}
              {(d.fotoAusente||d.foto)&&<span style={{color:B.info,fontWeight:700}}>📷 foto</span>}
            </div>
            {exp&&<div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${B.border}`}}>
              {d.telefono&&<div style={{fontSize:13,color:B.gray,marginBottom:6}}>📞 {d.telefono}</div>}
              {d.notas&&<div style={{fontSize:13,color:B.dark,background:isAbsent?B.absentBg:d.urgente?"#FEE2E2":B.orangeLight,padding:"8px 12px",borderRadius:8,marginBottom:10}}>💬 {d.notas}</div>}
              {d.fotoAusente&&<div style={{marginBottom:10}}><div style={{fontSize:11,color:B.absent,fontWeight:800,textTransform:"uppercase",marginBottom:6}}>Foto de evidencia</div><img src={d.fotoAusente} alt="Evidencia" style={{width:"100%",borderRadius:10,border:`1.5px solid ${B.absentBorder}`,maxHeight:180,objectFit:"cover"}}/></div>}
              {d.firmado&&d.receptor&&<div style={{marginBottom:10}}>
                <div style={{fontSize:13,color:B.success,background:B.successBg,padding:"8px 12px",borderRadius:"8px 8px 0 0"}}>Recibido por <strong>{d.receptor}</strong>{d.entregadoPor&&<span style={{color:B.gray,fontWeight:600}}> · {d.entregadoPor}</span>}</div>
                {d.firma&&<img src={d.firma} alt="Firma" style={{width:"100%",border:`1px solid #6EE7B7`,borderTop:"none",borderRadius:"0 0 8px 8px",background:"white",display:"block"}}/>}
                {d.foto&&<img src={d.foto} alt="Foto" style={{width:"100%",marginTop:6,borderRadius:8,border:`1.5px solid ${B.border}`,maxHeight:180,objectFit:"cover"}}/>}
                <button onClick={e=>{e.stopPropagation();openComprobante(d);}} style={{marginTop:6,width:"100%",background:B.orange,color:"white",border:"none",borderRadius:8,padding:"8px",cursor:"pointer",fontWeight:800,fontSize:12}}>📄 Ver comprobante</button>
              </div>}
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {d.estado!=="entregado"&&!isAbsent&&<Btn size="sm" variant="secondary" onClick={e=>{e.stopPropagation();onUpdateStatus(d.id,d.estado==="pendiente"?"en_camino":"entregado");}}>{d.estado==="pendiente"?"▶ En camino":"Entregado"}</Btn>}
                {isAbsent&&<Btn size="sm" variant="secondary" onClick={e=>{e.stopPropagation();onUpdateStatus(d.id,"pendiente");}}>↩ Reintentar</Btn>}
                {!d.urgente&&!isAbsent&&d.estado!=="entregado"&&<Btn size="sm" variant="urgentSoft" onClick={e=>{e.stopPropagation();onToggleUrgent(d.id,true);onLog("marcó urgente",`"${d.cliente}"`);}}> Urgente</Btn>}
                {!isAbsent&&d.estado!=="entregado"&&<Btn size="sm" variant="secondary" onClick={e=>{e.stopPropagation();setEditingId(d.id);}}>✏ Editar</Btn>}
                {d.urgente&&!isAbsent&&<Btn size="sm" variant="ghost" onClick={e=>{e.stopPropagation();onToggleUrgent(d.id,false);}}>Quitar urgente</Btn>}
                <Btn size="sm" variant="ghost" onClick={e=>{e.stopPropagation();if(window.confirm(`Eliminar "${d.cliente}"?`)){onLog("eliminó",`"${d.cliente}"`);onDelete(d.id);}}}>🗑 Eliminar</Btn>
              </div>
            </div>}
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flexShrink:0}}>
            {!d.urgente&&d.estado==="pendiente"&&<><button onClick={e=>{e.stopPropagation();onReorder(d.id,-1);}} style={{background:B.border,border:"none",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:14,color:B.gray,lineHeight:1}}>↑</button><button onClick={e=>{e.stopPropagation();onReorder(d.id,1);}} style={{background:B.border,border:"none",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:14,color:B.gray,lineHeight:1}}>↓</button></>}
            <div style={{color:B.gray,fontSize:18,transition:"transform .2s",transform:exp?"rotate(90deg)":"none"}}>›</div>
          </div>
        </div>
      </Card>
    );
  };

  return (
    <div className="shell">
      {editingId&&<EditDeliveryModal delivery={deliveries.find(d=>d.id===editingId)} onClose={()=>setEditingId(null)} onSave={onEdit}/>}
      {showLog&&<LogModal onClose={()=>setShowLog(false)}/>}
      {showReset&&<DayResetModal deliveries={deliveries} onClose={()=>setShowReset(false)} onConfirm={onResetDay}/>}
      <div className="top-bar">
        <div className="top-bar-in">
          <MundoLogo size={44}/>
          <div style={{flex:1}}>
            <div style={{fontSize:18,fontWeight:800,color:B.dark}}>Reparto del día</div>
            <div style={{fontSize:13,color:B.gray,textTransform:"capitalize"}}>{today}</div>
          </div>
          <Avatar name={userName} size={32}/>
          <button onClick={()=>setShowLog(true)} style={{background:B.orangeLight,border:"none",borderRadius:10,padding:"8px 12px",cursor:"pointer",color:B.orange,fontWeight:700,fontSize:13}}>📋</button>
          <button onClick={()=>setShowReset(true)} style={{background:B.bg,border:`1.5px solid ${B.border}`,borderRadius:10,padding:"8px 12px",cursor:"pointer",color:B.gray,fontWeight:700,fontSize:13}} title="Cerrar el día">🌙</button>
          <button onClick={onLogout} style={{background:isAdmin?B.orangeLight:"none",border:"none",color:isAdmin?B.orange:B.gray,borderRadius:isAdmin?10:0,padding:isAdmin?"8px 14px":"0",cursor:"pointer",fontSize:14,fontWeight:700}}>{isAdmin?"← Panel Admin":"← Salir"}</button>
        </div>
      </div>

      <div className="page-wrap">
        {urgentPending.length>0&&<div style={{background:B.urgentBg,border:`2px solid ${B.urgentBorder}`,borderRadius:14,padding:"12px 18px",marginBottom:20,display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:26}}>🚨</span><div><div style={{fontSize:15,fontWeight:800,color:B.urgent}}>{urgentPending.length} pedido{urgentPending.length>1?"s":""} urgente{urgentPending.length>1?"s":""}</div><div style={{fontSize:13,color:"#B91C1C"}}>{urgentPending.map(d=>d.cliente).join(", ")}</div></div></div>}
        {stats.ausente>0&&<div style={{background:B.absentBg,border:`2px solid ${B.absentBorder}`,borderRadius:14,padding:"12px 18px",marginBottom:20,display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:26}}>🏠</span><div><div style={{fontSize:15,fontWeight:800,color:B.absent}}>{stats.ausente} cliente{stats.ausente>1?"s":""} no estaba{stats.ausente>1?"n":""}</div><div style={{fontSize:13,color:"#6D28D9"}}>{absentList.map(d=>d.cliente).join(", ")}</div></div></div>}

        <div className="main-grid">
          <div className="panel-left">
            <div className="stats-grid" style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:20}}>
              {[{label:"Total",val:stats.total,color:B.orange},{label:"Pendientes",val:stats.pendiente,color:"#D97706"},{label:"En camino",val:stats.en_camino,color:B.info},{label:"Entregados",val:stats.entregado,color:B.success}].map(s=>(
                <div key={s.label} style={{background:B.white,borderRadius:14,padding:"14px 12px",textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
                  <div style={{fontSize:30,fontWeight:800,color:s.color,lineHeight:1}}>{s.val}</div>
                  <div style={{fontSize:12,color:B.gray,marginTop:5}}>{s.label}</div>
                </div>
              ))}
            </div>

            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
              {[{key:"todos",label:"Todos",icon:"📋"},{key:"Camión",label:"Camión",icon:"🚚"},{key:"Pick-up",label:"Pick-up",icon:"🛻"},{key:"Auto",label:"Auto",icon:"🚗"},{key:"Tercerizado",label:"Ext.",icon:"📦"}].map(t=>{
                const count=t.key==="todos"?deliveries.filter(d=>d.estado!=="entregado"&&d.estado!=="ausente").length:deliveries.filter(d=>d.vehiculo===t.key&&d.estado!=="entregado"&&d.estado!=="ausente").length;
                const a2=vTab===t.key;
                return <button key={t.key} onClick={()=>{setVTab(t.key);setExpandedId(null);}} style={{background:a2?B.orange:"white",color:a2?"white":B.gray,border:a2?"none":`1.5px solid ${B.border}`,borderRadius:20,padding:"7px 14px",cursor:"pointer",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",gap:5,flexShrink:0,boxShadow:a2?"0 2px 8px rgba(250,110,15,.3)":"none"}}>
                  <span>{t.icon}</span><span>{t.label}</span>{count>0&&<span style={{background:a2?"rgba(255,255,255,.3)":"#E5E7EB",borderRadius:99,padding:"1px 7px",fontSize:11}}>{count}</span>}
                </button>;
              })}
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}} className="mobile-add-btn">
              <Btn onClick={()=>openForm(false)} full variant="secondary">+ Agregar</Btn>
              <Btn onClick={()=>openForm(true)} full variant="urgent">Urgente</Btn>
            </div>
            <div style={{marginBottom:16}} className="mobile-add-btn">
              {mode!==null&&<DeliveryForm mode={mode} form={form} setForm={setForm} onSave={handleSave} onCancel={()=>{setMode(null);setForm(empty);}}/>}
            </div>

            {active.length>=2&&<div style={{marginBottom:14}}>
              <button onClick={handleOptimize} disabled={optimizing} style={{width:"100%",background:optimizing?"#E5E7EB":B.info,color:optimizing?B.gray:"white",border:"none",borderRadius:12,padding:"13px 20px",cursor:optimizing?"not-allowed":"pointer",fontWeight:800,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                {optimizing?<><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span> Calculando ruta...</>:<>🚀 Optimizar Ruta Automáticamente</>}
              </button>
              {optMsg&&<div style={{marginTop:8,fontSize:13,fontWeight:700,color:optMsg.startsWith("Ruta")?B.success:optMsg.startsWith("Error")?"#DC2626":B.info,textAlign:"center",padding:"8px 12px",background:optMsg.startsWith("Ruta")?B.successBg:optMsg.startsWith("Error")?"#FEF2F2":B.infoBg,borderRadius:10}}>{optMsg}</div>}
            </div>}

            {urgentPending.length>0&&<div style={{fontSize:12,fontWeight:800,color:B.urgent,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.6px"}}>Urgentes primero</div>}

            <div className="delivery-list" style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={{background:"#F0FDF4",border:"2px solid #6EE7B7",borderRadius:14,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:32,height:32,borderRadius:"50%",background:"#D1FAE5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🏠</div>
                <div><div style={{fontSize:10,color:"#059669",fontWeight:800,textTransform:"uppercase",letterSpacing:"0.5px"}}>Salida desde</div><div style={{fontSize:14,fontWeight:700,color:"#065F46"}}>Cagancha 2273, esq. Acevedo Díaz</div></div>
              </div>
              {deliveries.length===0&&<div style={{textAlign:"center",padding:"60px 20px",color:B.gray}}><div style={{fontSize:56,marginBottom:12}}>📦</div><div style={{fontSize:16,fontWeight:700}}>No hay entregas cargadas</div></div>}
              {active.map((d,idx)=>{
                const exp=expandedId===d.id;
                const sep=idx>0&&!d.urgente&&active[idx-1].urgente;
                return <div key={d.id}>{sep&&<div style={{fontSize:12,fontWeight:700,color:B.gray,marginBottom:8,marginTop:4,textTransform:"uppercase",letterSpacing:"0.6px"}}>Ruta del día</div>}<DeliveryCard d={d} exp={exp}/></div>;
              })}
              {absentList.length>0&&<div style={{marginTop:4}}>
                <button onClick={()=>setShowAbsent(s=>!s)} style={{width:"100%",background:"none",border:`1.5px solid ${B.absentBorder}`,borderRadius:12,padding:"10px 16px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:14,fontWeight:700,color:B.absent}}>
                  <span>🏠 No estaban en casa ({absentList.length})</span><span>{showAbsent?"▾":"▸"}</span>
                </button>
                {showAbsent&&<div style={{marginTop:8,display:"flex",flexDirection:"column",gap:8}}>
                  {absentList.map(d=><DeliveryCard key={d.id} d={d} exp={expandedId===d.id}/>)}
                </div>}
              </div>}
              {delivered.length>0&&<div style={{marginTop:4}}>
                <button onClick={()=>setShowDelivered(s=>!s)} style={{width:"100%",background:"none",border:`1.5px solid ${B.border}`,borderRadius:12,padding:"10px 16px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:14,fontWeight:700,color:B.gray}}>
                  <span>✅ Entregados ({delivered.length})</span><span>{showDelivered?"▾":"▸"}</span>
                </button>
                {showDelivered&&<div style={{marginTop:8,display:"flex",flexDirection:"column",gap:8}}>
                  {delivered.map(d=>(
                    <div key={d.id} style={{background:"#F9FAFB",borderRadius:12,padding:"12px 14px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <div style={{width:32,height:32,borderRadius:"50%",background:B.successBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:B.success,flexShrink:0}}>✓</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:14,fontWeight:700,color:B.gray,textDecoration:"line-through"}}>{d.cliente}</div>
                          <div style={{fontSize:12,color:B.gray,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📍 {d.direccion}{d.receptor&&` · ${d.receptor}`}</div>
                          {d.entregadoPor&&<div style={{fontSize:11,color:B.orange,fontWeight:700,marginTop:2}}>Por: {d.entregadoPor}</div>}
                        </div>
                        <div style={{display:"flex",gap:6,flexShrink:0}}>
                          <button onClick={()=>openComprobante(d)} style={{background:B.orange,color:"white",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontWeight:800,fontSize:12}}>📄</button>
                          <button onClick={()=>{if(window.confirm(`Eliminar "${d.cliente}"?`)){onLog("eliminó",`"${d.cliente}"`);onDelete(d.id);}}} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#D1D5DB",padding:"4px 6px",borderRadius:8}}>🗑</button>
                        </div>
                      </div>
                      {d.foto&&<img src={d.foto} alt="Foto" style={{width:"100%",marginTop:10,borderRadius:8,border:`1px solid ${B.border}`,background:"white",maxHeight:140,objectFit:"cover"}}/>}
                      {d.firma&&<img src={d.firma} alt="Firma" style={{width:"100%",marginTop:6,borderRadius:8,border:`1px solid ${B.border}`,background:"white",maxHeight:80,objectFit:"contain"}}/>}
                    </div>
                  ))}
                </div>}
              </div>}
            </div>
          </div>

          <div className="panel-right">
            <div style={{marginBottom:12,display:"flex",gap:10}}>
              <Btn onClick={()=>openForm(false)} full variant="secondary">+ Agregar Entrega</Btn>
              <Btn onClick={()=>openForm(true)} full variant="urgent">Urgente</Btn>
            </div>
            <DeliveryForm mode={mode} form={form} setForm={setForm} onSave={handleSave} onCancel={()=>{setMode(null);setForm(empty);}}/>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── CHOFER ── */
function ChoferScreen({deliveries,vehicle,userName,isAdmin=false,onSelectDelivery,onLogout}) {
  const [showDelivered,setShowDelivered]=useState(false);
  const mine=deliveries.filter(d=>d.vehiculo===vehicle);
  const done=mine.filter(d=>d.estado==="entregado").length;
  const total=mine.length;
  const pct=total>0?Math.round((done/total)*100):0;
  const current=mine.find(d=>d.estado==="en_camino");
  const today=new Date().toLocaleDateString("es-UY",{weekday:"long",day:"numeric",month:"long"});
  const urgentPending=mine.filter(d=>d.urgente&&d.estado!=="entregado"&&d.estado!=="ausente");
  const active=[...mine].filter(d=>d.estado!=="entregado"&&d.estado!=="ausente").sort((a,b)=>{if(a.urgente&&!b.urgente)return -1;if(!a.urgente&&b.urgente)return 1;return a.orden-b.orden;});
  const delivered=[...mine].filter(d=>d.estado==="entregado");
  const absentMine=[...mine].filter(d=>d.estado==="ausente");
  const routeUrl=active.length>0?`https://www.google.com/maps/dir/${encodeURIComponent(ORIGIN)}/${active.map(d=>encodeURIComponent(d.direccion+", Montevideo, Uruguay")).join("/")}`:null;

            <div style={{background:"rgba(255,255,255,.28)",borderRadius:999,height:12}}><div style={{background:"white",borderRadius:999,height:12,width:`${pct}%`,transition:"width .6s",minWidth:pct>0?12:0}}/></div>
          </div>
        </div>
      </div>
      <div className="page-wrap">
        {total===0&&<div style={{textAlign:"center",padding:"60px 20px",color:B.gray}}><div style={{fontSize:56,marginBottom:12}}>{VE[vehicle]}</div><div style={{fontSize:18,fontWeight:800,color:B.dark}}>Sin pedidos para {vehicle}</div></div>}
        {urgentPending.length>0&&<div style={{background:B.urgentBg,border:`2px solid ${B.urgentBorder}`,borderRadius:14,padding:"14px 18px",marginBottom:20}}><div style={{display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:28}}>🚨</span><div><div style={{fontSize:15,fontWeight:800,color:B.urgent}}>Pedido{urgentPending.length>1?"s":""} urgente{urgentPending.length>1?"s":""}!</div><div style={{fontSize:13,color:"#B91C1C"}}>{urgentPending.map(d=>d.cliente).join(" · ")}</div></div></div></div>}
        {current&&<div style={{background:B.infoBg,border:`2px solid ${B.info}`,borderRadius:14,padding:"14px 18px",marginBottom:20,display:"flex",alignItems:"center",gap:14}}><span style={{fontSize:26,flexShrink:0}}>📍</span><div style={{flex:1,minWidth:0}}><div style={{fontSize:12,color:B.info,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.5px"}}>En camino →</div><div style={{fontSize:16,fontWeight:800,color:B.dark}}>{current.cliente}</div><div style={{fontSize:13,color:B.info,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{current.direccion}</div></div><button onClick={()=>onSelectDelivery(current.id)} style={{background:B.info,color:"white",border:"none",borderRadius:12,padding:"10px 18px",cursor:"pointer",fontWeight:800,fontSize:14,flexShrink:0}}>Ver →</button></div>}

        <div className="chofer-grid" style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{background:"#F0FDF4",border:"2px solid #6EE7B7",borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>

              <div style={{width:42,height:42,borderRadius:"50%",flexShrink:0,background:"#DDD6FE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:800,color:B.absent}}>🏠</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:16,fontWeight:800,color:B.absent}}>{d.cliente}</div>
                <div style={{fontSize:13,color:B.absent,marginTop:3}}>No estaba — podés reintentar</div>
                <div style={{fontSize:13,color:B.gray,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📍 {d.direccion}</div>
              </div>
              <Badge status="ausente"/>
            </button>
          ))}
          {delivered.length>0&&<div style={{marginTop:4}}>
            <button onClick={()=>setShowDelivered(s=>!s)} style={{width:"100%",background:"none",border:`1.5px solid ${B.border}`,borderRadius:12,padding:"10px 16px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:14,fontWeight:700,color:B.gray}}>
              <span>✅ Entregados ({delivered.length})</span><span>{showDelivered?"▾":"▸"}</span>
            </button>
            {showDelivered&&<div style={{marginTop:8,display:"flex",flexDirection:"column",gap:8}}>
              {delivered.map(d=>(
                <div key={d.id} style={{background:"#F9FAFB",borderRadius:12,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:38,height:38,borderRadius:"50%",background:B.successBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:B.success,flexShrink:0}}>✓</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:15,fontWeight:700,color:B.gray,textDecoration:"line-through"}}>{d.cliente}</div>
                    <div style={{fontSize:12,color:B.gray,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📍 {d.direccion}{d.receptor&&` · ${d.receptor}`}</div>
                  </div>
                  <button onClick={()=>openComprobante(d)} style={{background:B.orange,color:"white",border:"none",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontWeight:800,fontSize:12,flexShrink:0}}>📄</button>
                </div>
              ))}

          </div>}
        </div>
      </div>
    </div>
  );
}

/* ── DELIVERY DETAIL ── */
function DeliveryDetail({delivery,onBack,onStart,onSign,onAbsent}) {
  const [llegoTime, setLlegoTime] = useState(null);
  const [showAbsentModal,setShowAbsentModal]=useState(false);
  const [locError, setLocError] = useState(null);

  // GPS tracking: share location to Firebase while en_camino
  useEffect(()=>{
    if(delivery.estado!=="en_camino"||!delivery.tracking) return;
    if(!navigator.geolocation){setLocError("no_support");return;}
    const watchId=navigator.geolocation.watchPosition(
      (pos)=>{
        db.ref("tracking/"+delivery.tracking+"/vehicleLocation").set({
          lat:pos.coords.latitude, lng:pos.coords.longitude, ts:Date.now()
        });
        setLocError(null);
      },
      (err)=>{
        if(err.code===1) setLocError("denied");
        else setLocError("error");
      },
      {enableHighAccuracy:true, maximumAge:8000, timeout:20000}
    );
    return()=>{
      navigator.geolocation.clearWatch(watchId);
      // Clear location when no longer en_camino
      if(delivery.tracking) db.ref("tracking/"+delivery.tracking+"/vehicleLocation").remove();
    };
  },[delivery.estado, delivery.tracking]);
  const wazeUrl=`https://waze.com/ul?navigate=yes&q=${encodeURIComponent(delivery.direccion+", Montevideo, Uruguay")}`;
  const isAbsent=delivery.estado==="ausente";
  return (
    <div className="shell">
      {showAbsentModal&&<AbsentConfirmModal onConfirm={(foto)=>{setShowAbsentModal(false);onAbsent(foto);}} onCancel={()=>setShowAbsentModal(false)}/>}
      <div className="top-bar">
        <div className="top-bar-in">
          <button onClick={onBack} style={{background:B.orangeLight,border:"none",borderRadius:10,padding:"9px 16px",cursor:"pointer",color:B.orange,fontWeight:700,fontSize:14}}>← Volver</button>
          <div style={{flex:1,fontSize:17,fontWeight:800,color:B.dark}}>Detalle de Entrega</div>
          <div style={{display:"flex",gap:6}}>{delivery.urgente&&<UrgBadge/>}<Badge status={delivery.estado}/></div>
        </div>
      </div>
      <div className="page-wrap" style={{maxWidth:700}}>
        {isAbsent&&<div style={{background:B.absentBg,border:`2px solid ${B.absentBorder}`,borderRadius:14,padding:"14px 18px",marginBottom:20,display:"flex",gap:12,alignItems:"center"}}><span style={{fontSize:26}}>🏠</span><div><div style={{fontSize:15,fontWeight:800,color:B.absent}}>No estaba en casa</div><div style={{fontSize:13,color:"#6D28D9"}}>Podés reintentar o coordinar por WhatsApp</div></div></div>}
        {isAbsent&&delivery.fotoAusente&&<div style={{marginBottom:16}}><div style={{fontSize:12,color:B.absent,fontWeight:800,textTransform:"uppercase",marginBottom:6}}>Foto de evidencia</div><img src={delivery.fotoAusente} alt="Evidencia" style={{width:"100%",borderRadius:12,border:`1.5px solid ${B.absentBorder}`,maxHeight:220,objectFit:"cover"}}/></div>}
        {delivery.urgente&&!isAbsent&&<div style={{background:B.urgentBg,border:`2px solid ${B.urgentBorder}`,borderRadius:14,padding:"14px 18px",marginBottom:20,display:"flex",gap:12,alignItems:"center"}}><span style={{fontSize:26}}>🚨</span><div style={{fontSize:15,fontWeight:800,color:B.urgent}}>Pedido urgente — prioridad máxima</div></div>}
        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:24}}>
          <div style={{width:56,height:56,background:isAbsent?B.absent:delivery.urgente?B.urgent:B.orange,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:900,color:"white",flexShrink:0}}>{isAbsent?"🏠":delivery.urgente?"🚨":delivery.orden}</div>
          <div><div style={{fontSize:12,color:B.gray,textTransform:"uppercase",letterSpacing:"0.5px"}}>Parada #{delivery.orden}</div><div style={{fontSize:24,fontWeight:900,color:isAbsent?B.absent:delivery.urgente?B.urgent:B.dark}}>{delivery.cliente}</div></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <Card style={{gridColumn:"1/-1"}}><div style={{fontSize:11,color:B.gray,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.5px"}}>Dirección</div><div style={{fontSize:17,fontWeight:700,color:B.dark}}>{delivery.direccion}</div></Card>
          <Card><div style={{fontSize:11,color:B.gray,marginBottom:5}}>Teléfono</div><div style={{fontSize:16,fontWeight:700,color:B.dark}}>{delivery.telefono||"—"}</div></Card>
          <Card><div style={{fontSize:11,color:B.gray,marginBottom:5}}>Bultos</div><div style={{fontSize:16,fontWeight:700,color:B.dark}}>📦 {delivery.bultos}</div></Card>
          <Card><div style={{fontSize:11,color:B.gray,marginBottom:5}}>Vehículo</div><div style={{fontSize:16,fontWeight:700,color:B.dark}}>{VE[delivery.vehiculo]} {delivery.vehiculo}</div></Card>
          <Card><div style={{fontSize:11,color:B.gray,marginBottom:5}}>Hora estimada</div><div style={{fontSize:16,fontWeight:700,color:B.dark}}>🕐 {delivery.hora||"—"}</div></Card>
        </div>
        {delivery.notas&&<Card style={{marginBottom:12,background:delivery.urgente?B.urgentBg:B.orangeLight,border:`1.5px solid ${delivery.urgente?B.urgentBorder:"#FDBF8A"}`}}><div style={{fontSize:11,color:delivery.urgente?B.urgent:B.orange,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:6}}>Notas</div><div style={{fontSize:15,color:B.dark}}>{delivery.notas}</div></Card>}
        <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:20}}>
          <Btn full variant="ghost" size="lg" href={wazeUrl}>🗺 Navegar con Waze</Btn>
          {delivery.telefono&&<Btn full variant="ghost" size="lg" href={`tel:${delivery.telefono}`}>📞 Llamar · {delivery.telefono}</Btn>}
          {delivery.telefono&&(()=>{
            const t=wpNum(delivery.telefono);
            if(isAbsent){
              const mAusente="Hola! Pasamos a entregar tu pedido de Mundo M en "+delivery.direccion+" pero no encontramos a nadie. Por favor contactanos para coordinar una nueva fecha de entrega. Gracias!";
              return <a href={"https://wa.me/"+t+"?text="+encodeURIComponent(mAusente)} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"#25D366",color:"white",borderRadius:12,padding:"13px 20px",fontWeight:800,fontSize:15,textDecoration:"none",width:"100%",boxSizing:"border-box"}}>Coordinar nueva entrega por WhatsApp</a>;
            }
            const trackUrl=delivery.tracking?(window.location.href.split('#')[0]+"#track/"+delivery.tracking):"";
            const mCamino="Hola! Soy del equipo de Mundo M. Tu pedido está en camino y llegamos a "+delivery.direccion+" pronto."+(trackUrl?" Podés seguir tu entrega en tiempo real aquí: "+trackUrl:"")+" Te avisamos cuando estemos cerca. Gracias!";
            const m3min="Hola! Estamos a 3 minutos de tu casa. Agradecemos nos esperes en la puerta para poder entregarte tu producto! Gracias!";
            return <><a href={"https://wa.me/"+t+"?text="+encodeURIComponent(mCamino)} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"#25D366",color:"white",borderRadius:12,padding:"13px 20px",fontWeight:800,fontSize:15,textDecoration:"none",width:"100%",boxSizing:"border-box"}}>Pedido en camino</a><a href={"https://wa.me/"+t+"?text="+encodeURIComponent(m3min)} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"#128C7E",color:"white",borderRadius:12,padding:"13px 20px",fontWeight:800,fontSize:15,textDecoration:"none",width:"100%",boxSizing:"border-box"}}>Llegamos en 3 minutos</a></>;
          })()}
          {!isAbsent&&delivery.estado==="pendiente"&&<Btn full variant="secondary" size="lg" onClick={onStart}>▶ Iniciar entrega</Btn>}
          {!isAbsent&&delivery.estado==="en_camino"&&!llegoTime&&<Btn full variant="ghost" size="lg" onClick={()=>{db.ref("deliveries/"+delivery.id+"/llegadaTs").set(Date.now());setLlegoTime(new Date().toLocaleTimeString("es-UY",{hour:"2-digit",minute:"2-digit"}));}}>📍 Llegué</Btn>}
          {llegoTime&&<div style={{background:B.infoBg,borderRadius:12,padding:12,fontSize:14,color:B.info,fontWeight:700,textAlign:"center"}}>📍 Llegaste a las {llegoTime}</div>}
          {delivery.estado==="en_camino"&&locError==="denied"&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:10,padding:"10px 14px",fontSize:12,color:B.urgent,marginTop:6}}>⚠️ Permiso de ubicación denegado. El cliente no podrá ver tu posición en el mapa. Activalo en la configuración del navegador.</div>}
          {delivery.estado==="en_camino"&&!locError&&delivery.tracking&&<div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:10,padding:"8px 14px",fontSize:12,color:B.success,marginTop:6}}>📡 Compartiendo ubicación en tiempo real con el cliente</div>}
          {!isAbsent&&delivery.estado==="en_camino"&&<Btn full variant="primary" size="lg" onClick={onSign}>✅ Confirmar y registrar firma</Btn>}
          {!isAbsent&&(delivery.estado==="pendiente"||delivery.estado==="en_camino")&&(
            <button onClick={()=>setShowAbsentModal(true)} style={{width:"100%",background:B.absentBg,border:`1.5px solid ${B.absentBorder}`,borderRadius:12,padding:"15px 24px",cursor:"pointer",fontWeight:800,fontSize:15,color:B.absent,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              🏠 No estaba en casa
            </button>
          )}
          {isAbsent&&<Btn full variant="secondary" size="lg" onClick={()=>onAbsent("retry")}>↩ Reintentar entrega</Btn>}
        </div>
      </div>
    </div>
  );
}

/* ── SIGNATURE ── */
function SignatureScreen({delivery,onConfirm,onBack}) {
  const canvasRef=useRef(null);
  const [drawing,setDrawing]=useState(false);
  const [hasSig,setHasSig]=useState(false);
  const [receptor,setReceptor]=useState("");
  const [foto,setFoto]=useState(null);
  const last=useRef(null);
  const getPos=(e,c)=>{const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height,s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*sx,y:(s.clientY-r.top)*sy};};
  const start=e=>{e.preventDefault();setDrawing(true);const p=getPos(e,canvasRef.current);last.current=p;const ctx=canvasRef.current.getContext("2d");ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fillStyle=B.dark;ctx.fill();};
  const draw=e=>{e.preventDefault();if(!drawing)return;const c=canvasRef.current,ctx=c.getContext("2d"),p=getPos(e,c);ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle=B.dark;ctx.lineWidth=3;ctx.lineCap="round";ctx.lineJoin="round";ctx.stroke();last.current=p;setHasSig(true);};
  const end=()=>setDrawing(false);
  return (
    <div className="shell">
      <div className="top-bar"><div className="top-bar-in"><button onClick={onBack} style={{background:B.orangeLight,border:"none",borderRadius:10,padding:"9px 16px",cursor:"pointer",color:B.orange,fontWeight:700,fontSize:14}}>← Volver</button><div style={{fontSize:17,fontWeight:800,color:B.dark}}>Confirmación de Entrega</div></div></div>
      <div className="page-wrap" style={{maxWidth:600}}>
        <Card style={{marginBottom:20,background:B.orangeLight,border:"1.5px solid #FDBF8A"}}>
          <div style={{fontSize:12,fontWeight:700,color:B.orange,textTransform:"uppercase",letterSpacing:"0.5px"}}>Entregando a:</div>
          <div style={{fontSize:22,fontWeight:900,color:B.dark,marginTop:4}}>{delivery.cliente}</div>
          <div style={{fontSize:14,color:B.gray,marginTop:2}}>📦 {delivery.bultos} bulto{delivery.bultos>1?"s":""} · {delivery.direccion}</div>
        </Card>
        <Field label="Nombre de quien recibe" value={receptor} onChange={setReceptor} placeholder="Ej: Maria Gonzalez" required/>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:700,color:B.dark,marginBottom:8}}>Foto de la entrega <span style={{fontSize:12,color:B.gray,fontWeight:400}}>(opcional)</span></div>
          <PhotoCapture onCapture={setFoto} label="Sacar foto de la entrega"/>
        </div>
        <div style={{marginBottom:24}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <label style={{fontSize:13,fontWeight:700,color:B.dark}}>Firma del receptor <span style={{color:B.orange}}>*</span></label>
            {hasSig&&<button onClick={()=>{canvasRef.current.getContext("2d").clearRect(0,0,600,220);setHasSig(false);}} style={{background:"none",border:"none",color:B.gray,cursor:"pointer",fontSize:13}}>🗑 Borrar</button>}
          </div>
          <div style={{border:`2px dashed ${hasSig?B.orange:B.border}`,borderRadius:16,overflow:"hidden",background:B.white,position:"relative",touchAction:"none"}}>
            <canvas ref={canvasRef} width={600} height={220} style={{width:"100%",height:220,display:"block",cursor:"crosshair"}} onMouseDown={start} onMouseMove={draw} onMouseUp={end} onMouseLeave={end} onTouchStart={start} onTouchMove={draw} onTouchEnd={end}/>
            {!hasSig&&<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",color:"#D1D5DB",fontSize:15,pointerEvents:"none"}}>Firma aqui</div>}

/* ── LIVE MAP ── */
function LiveMap({vehicleLocation}) {
  const mapRef = useRef(null);
  const mapInstance = useRef(null);
  const markerRef = useRef(null);

  useEffect(()=>{
    if(!mapRef.current || !vehicleLocation) return;
    const {lat, lng} = vehicleLocation;
    if(!window.L) return; // Leaflet not loaded

    if(!mapInstance.current) {
      mapInstance.current = window.L.map(mapRef.current, {zoomControl:true, attributionControl:false}).setView([lat, lng], 15);
      window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance.current);
      const icon = window.L.divIcon({html:'<div class="vehicle-marker-icon">🚚</div>', className:'', iconSize:[36,36], iconAnchor:[18,18]});
      markerRef.current = window.L.marker([lat, lng], {icon}).addTo(mapInstance.current);
    } else {
      markerRef.current.setLatLng([lat, lng]);
      mapInstance.current.panTo([lat, lng], {animate:true, duration:1});
    }
  }, [vehicleLocation]);

  useEffect(()=>{
    return()=>{
      if(mapInstance.current){ mapInstance.current.remove(); mapInstance.current=null; }
    };
  },[]);

  const secsAgo = vehicleLocation ? Math.round((Date.now()-vehicleLocation.ts)/1000) : 0;

  return (
    <div style={{marginTop:16}}>
      <div style={{fontSize:12,fontWeight:700,color:"#1D4ED8",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
        <span style={{width:8,height:8,borderRadius:"50%",background:"#10B981",display:"inline-block",animation:"pulse 1.5s infinite"}}/>
        Ubicación en tiempo real · actualizada hace {secsAgo < 60 ? secsAgo+"s" : Math.round(secsAgo/60)+"min"}
      </div>
      <div ref={mapRef} style={{height:220,borderRadius:12,overflow:"hidden",border:"1.5px solid #DBEAFE"}}/>
      <div style={{fontSize:11,color:"#6B7280",marginTop:6,textAlign:"center"}}>🗺️ El vehículo se actualiza automáticamente</div>
    </div>
  );
}
